<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karekod Oto | Araç Servis Geçmişi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --text: #0f172a; --success: #22c55e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; }
        
        /* Header & Sosyal */
        .header-area { text-align: center; padding: 10px 0; }
        .s-logo { width: 90px; height: 90px; border-radius: 22px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 10px; border: 3px solid white; }
        .social-bar { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .s-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 18px; }
        .bg-wp { background: #25d366; } .bg-insta { background: #e4405f; } .bg-map { background: #4285f4; }

        /* Seçenek Butonları (Checkbox Fix) */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .opt-item { background: #f1f5f9; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .opt-item input { display: none; }
        .opt-item.active { background: #eff6ff; border-color: var(--accent); color: var(--accent); }

        /* Geçmiş Kayıtlar (Timeline) */
        .history-item { border-left: 3px solid var(--accent); padding-left: 15px; margin-bottom: 20px; position: relative; }
        .history-date { font-weight: 800; font-size: 14px; color: var(--accent); }
        .history-km { font-size: 12px; color: #64748b; font-weight: 600; }
        .history-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .tag { background: #e2e8f0; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }

        /* Form Elemanları */
        label { display: block; font-weight: 800; margin-bottom: 6px; font-size: 12px; color: #64748b; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 14px; border: 1.5px solid #e2e8f0; border-radius: 14px; margin-bottom: 15px; font-family: inherit; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 800; background: var(--accent); color: white; cursor: pointer; }
        
        #login-form, #register-form, #history-view, #success-msg { display: none; }
        .admin-badge { background: #fee2e2; color: #ef4444; padding: 4px 10px; border-radius: 10px; font-size: 10px; font-weight: 800; margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form" class="card" style="text-align:center; margin-top:50px;">
        <h2>Servis Aktivasyonu</h2>
        <input type="text" id="u-name" placeholder="Kullanıcı Adı">
        <input type="password" id="u-pass" placeholder="Şifre">
        <button id="btn-assign" class="btn-main">BAĞLA VE GİRİŞ YAP</button>
    </div>

    <div id="app-content">
        <div class="header-area">
            <img id="d-logo" class="s-logo" src="">
            <h2 id="d-name" style="margin:0">Yükleniyor...</h2>
            <div class="social-bar" id="social-container"></div>
        </div>

        <div id="history-view">
            <div class="card" style="text-align:center; background: var(--accent); color:white;">
                <h3 id="v-plaka-display" style="margin:0; font-size:24px;">---</h3>
                <p id="v-model-display" style="margin:5px 0 0; opacity:0.8;">Model Yükleniyor...</p>
            </div>
            <h3 style="margin-left:10px;"><i class="fas fa-history"></i> Servis Geçmişi</h3>
            <div id="history-list"></div>
            <button onclick="document.getElementById('register-form').style.display='block'; window.scrollTo(0,document.body.scrollHeight);" class="btn-main" style="background:#0f172a; margin-top:20px;">
                <i class="fas fa-plus"></i> YENİ KAYIT EKLE (USTA)
            </button>
        </div>

        <div id="register-form" class="card" style="margin-top:20px;">
            <span class="admin-badge">USTA KAYIT PANELİ</span>
            <label>Araç Plakası</label>
            <input type="text" id="v-plaka" placeholder="PLAKA">
            <input type="text" id="v-model" placeholder="MARKA / MODEL">
            <input type="number" id="v-km" placeholder="GÜNCEL KM">

            <label>Yapılan İşlemler</label>
            <div class="options-grid">
                <label class="opt-item"><input type="checkbox" value="Yağ Değişimi"> Yağ Değişimi</label>
                <label class="opt-item"><input type="checkbox" value="Hava Filtresi"> Hava Filtresi</label>
                <label class="opt-item"><input type="checkbox" value="Yağ Filtresi"> Yağ Filtresi</label>
                <label class="opt-item"><input type="checkbox" value="Fren Bakımı"> Fren Bakımı</label>
                <label class="opt-item"><input type="checkbox" value="Buji Değişimi"> Buji Değişimi</label>
                <label class="opt-item"><input type="checkbox" value="Zincir Bakımı"> Zincir / Kayış</label>
            </div>

            <label>Sonraki Bakım</label>
            <select id="v-next-km">
                <option value="5000">5.000 KM Sonra</option>
                <option value="10000">10.000 KM Sonra</option>
            </select>
            <textarea id="v-note" rows="2" placeholder="Notlar..."></textarea>
            <button id="btn-save" class="btn-main">KAYDI TAMAMLA</button>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const qrID = params.get('id');

    // Checkbox Fix
    document.addEventListener('change', (e) => {
        if(e.target.type === 'checkbox') {
            e.target.parentElement.classList.toggle('active', e.target.checked);
        }
    });

    async function baslat() {
        const q = query(collection(db, "karekodlar"), where("qr_id", "==", qrID));
        const snap = await getDocs(q);
        if(snap.empty) return;

        const qrDoc = snap.docs[0];
        const qrData = qrDoc.data();

        if(!qrData.servis_id) {
            document.getElementById('login-form').style.display = 'block';
        } else {
            servisYukle(qrData.servis_id, qrData, qrDoc.ref);
        }
    }

    async function servisYukle(sID, qrData, qrRef) {
        const sSnap = await getDoc(doc(db, "servisler", sID));
        const s = sSnap.data();

        // Dükkan Bilgileri
        document.getElementById('d-logo').src = s.s_logo;
        document.getElementById('d-name').innerText = s.s_name;
        const social = document.getElementById('social-container');
        if(s.s_wp) social.innerHTML += `<a href="https://wa.me/${s.s_wp}" class="s-btn bg-wp"><i class="fab fa-whatsapp"></i></a>`;
        if(s.s_insta) social.innerHTML += `<a href="https://instagram.com/${s.s_insta}" class="s-btn bg-insta"><i class="fab fa-instagram"></i></a>`;
        if(s.s_konum) social.innerHTML += `<a href="${s.s_konum}" class="s-btn bg-map"><i class="fas fa-map-marker-alt"></i></a>`;

        // Araç Geçmişi
        if(qrData.plaka) {
            document.getElementById('history-view').style.display = 'block';
            document.getElementById('v-plaka-display').innerText = qrData.plaka;
            document.getElementById('v-model-display').innerText = qrData.model || "Model Belirtilmedi";
            
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            (qrData.servisler || []).reverse().forEach(ser => {
                list.innerHTML += `
                    <div class="card history-item">
                        <div class="history-date">${ser.tarih}</div>
                        <div class="history-km">${ser.km} KM</div>
                        <div class="history-tags">
                            ${(ser.islemler || []).map(i => `<span class="tag">${i}</span>`).join('')}
                        </div>
                        <p style="font-size:13px; margin:10px 0 0;">${ser.not || ''}</p>
                    </div>`;
            });
        } else {
            document.getElementById('register-form').style.display = 'block';
        }

        // Kayıt Butonu
        document.getElementById('btn-save').onclick = async () => {
            const checks = [];
            document.querySelectorAll('.opt-item input:checked').forEach(i => checks.push(i.value));
            const km = parseInt(document.getElementById('v-km').value);
            
            await updateDoc(qrRef, {
                plaka: document.getElementById('v-plaka').value.toUpperCase(),
                model: document.getElementById('v-model').value,
                servisler: arrayUnion({
                    tarih: new Date().toLocaleDateString('tr-TR'),
                    km: km,
                    next_km: km + parseInt(document.getElementById('v-next-km').value),
                    islemler: checks,
                    not: document.getElementById('v-note').value
                })
            });
            location.reload();
        };
    }

    // Zimmetleme Butonu
    document.getElementById('btn-assign').onclick = async () => {
        const user = document.getElementById('u-name').value;
        const pass = document.getElementById('u-pass').value;
        const sSnap = await getDoc(doc(db, "servisler", user));
        if(sSnap.exists() && sSnap.data().s_sifre === pass) {
            const q = query(collection(db, "karekodlar"), where("qr_id", "==", qrID));
            const snap = await getDocs(q);
            await updateDoc(snap.docs[0].ref, { servis_id: user });
            location.reload();
        } else { alert("Hata!"); }
    };

    baslat();
</script>
</body>
</html>
