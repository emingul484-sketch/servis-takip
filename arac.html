<!DOCTYPE html>
<html>
<head>
  <title>Araç Bilgi</title>
</head>
<body>

<h2>Araç Bilgisi</h2>

<input id="plaka" placeholder="Plaka"><br><br>
<input id="km" placeholder="KM"><br><br>
<input id="bakim" placeholder="Bakım"><br><br>

<button onclick="kaydet()">Kaydet</button>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// URL'den ID al
const params = new URLSearchParams(window.location.search);
const aracId = params.get("id");

// veri çek
const docRef = doc(db, "araclar", aracId);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {
  const data = docSnap.data();
  document.getElementById("plaka").value = data.plaka || "";
  document.getElementById("km").value = data.km || "";
  document.getElementById("bakim").value = data.bakim || "";
}

// kaydet fonksiyonu
window.kaydet = async function() {
  await setDoc(doc(db, "araclar", aracId), {
    plaka: document.getElementById("plaka").value,
    km: document.getElementById("km").value,
    bakim: document.getElementById("bakim").value
  });

  alert("Kaydedildi!");
}
</script>

</body>
</html>
