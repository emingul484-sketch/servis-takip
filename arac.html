<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karekod Oto | Dijital Bakım Kartı</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --dark: #0f172a; --success: #22c55e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #f1f5f9; }
        
        /* Üst Alan & Logo */
        .header-area { text-align: center; padding: 10px 0; }
        .s-logo { width: 85px; height: 85px; border-radius: 20px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 3px solid white; margin-bottom: 10px; }
        .social-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .s-btn { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 18px; }
        .bg-wp { background: #22c55e; } .bg-insta { background: #e4405f; } .bg-map { background: #4285f4; }

        /* Plaka Kartı */
        .plaka-header { background: var(--dark); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .plaka-num { font-size: 32px; font-weight: 800; letter-spacing: 2px; display: block; }
        .model-name { font-size: 14px; opacity: 0.8; font-weight: 600; }

        /* Gelişmiş Seçenekler */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .opt-item { background: #f1f5f9; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .opt-item input { display: none; }
        .opt-item.active { background: #eff6ff; border-color: var(--accent); color: var(--accent); }

        /* Zaman Çizelgesi */
        .history-item { border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; position: relative; }
        .h-date { font-weight: 800; font-size: 14px; color: var(--accent); display: flex; justify-content: space-between; }
        .h-km { font-size: 12px; color: #64748b; font-weight: 700; margin: 4px 0; }
        .h-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
        .tag { background: #f1f5f9; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; color: #475569; }

        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 14px; margin-bottom: 12px; font-family: inherit; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-black { background: var(--dark); color: white; }

        #login-form, #master-form, #customer-view { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form" class="card" style="text-align:center; margin-top:50px;">
        <i class="fas fa-plug" style="font-size:40px; color:var(--accent); margin-bottom:15px"></i>
        <h2>Sistemi Aktif Et</h2>
        <input type="text" id="u-name" placeholder="Servis Kullanıcı Adı">
        <input type="password" id="u-pass" placeholder="Şifre">
        <button id="btn-assign" class="btn-main btn-blue">DÜKKANA TANIMLA</button>
    </div>

    <div id="app-content">
        <div class="header-area">
            <img id="d-logo" class="s-logo" src="">
            <h2 id="d-name" style="margin:0; font-size:20px">---</h2>
            <div class="social-bar" id="social-container"></div>
        </div>

        <div id="customer-view">
            <div class="plaka-header">
                <span class="plaka-num" id="v-plaka-display">---</span>
                <span class="model-name" id="v-model-display">---</span>
            </div>
            
            <h3 style="margin-bottom:15px; padding-left:5px"><i class="fas fa-history"></i> Servis Geçmişi</h3>
            <div id="history-list"></div>

            <button id="btn-open-master" class="btn-main btn-black" style="margin-top:20px">
                <i class="fas fa-tools"></i> YENİ BAKIM KAYDI (USTA)
            </button>
        </div>

        <div id="master-form" class="card">
            <div style="background:#fee2e2; color:#ef4444; padding:8px; border-radius:10px; font-size:12px; font-weight:800; margin-bottom:15px; display:inline-block">
                <i class="fas fa-user-shield"></i> YETKİLİ USTA PANELİ
            </div>

            <div id="first-time-fields" style="display:none">
                <label style="font-weight:800; font-size:12px; color:#64748b">İLK KAYIT: ARAÇ BİLGİLERİ</label>
                <input type="text" id="v-plaka-input" placeholder="PLAKA (Örn: 27 ABC 123)">
                <input type="text" id="v-model-input" placeholder="MARKA / MODEL (Örn: Honda PCX)">
                <hr style="border:1px solid #f1f5f9; margin-bottom:15px">
            </div>

            <label style="font-weight:800; font-size:12px; color:#64748b">BAKIM DETAYLARI</label>
            <input type="number" id="v-km" placeholder="GÜNCEL KM">

            <div class="options-grid">
                <label class="opt-item"><input type="checkbox" value="Yağ Değişimi"> Yağ Değişimi</label>
                <label class="opt-item"><input type="checkbox" value="Hava Filtresi"> Hava Filtresi</label>
                <label class="opt-item"><input type="checkbox" value="Yağ Filtresi"> Yağ Filtresi</label>
                <label class="opt-item"><input type="checkbox" value="Fren Bakımı"> Fren Bakımı</label>
                <label class="opt-item"><input type="checkbox" value="Varyatör Temizliği"> Varyatör</label>
                <label class="opt-item"><input type="checkbox" value="Zincir Bakımı"> Zincir / Kayış</label>
                <label class="opt-item"><input type="checkbox" value="Buji Değişimi"> Buji</label>
                <label class="opt-item"><input type="checkbox" value="Genel Kontrol"> Genel Bakım</label>
            </div>

            <select id="v-next-km">
                <option value="2500">2.500 KM Sonra Bakım</option>
                <option value="5000" selected>5.000 KM Sonra Bakım</option>
                <option value="10000">10.000 KM Sonra Bakım</option>
            </select>

            <textarea id="v-note" rows="2" placeholder="Ekstra notlar veya değişen parçalar..."></textarea>
            
            <button id="btn-save" class="btn-main btn-blue">KAYDI TAMAMLA VE GÖNDER</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#94a3b8; width:100%; margin-top:15px; font-weight:700">Geri Dön</button>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const qrID = new URLSearchParams(window.location.search).get('id');

    let currentQRRef = null;
    let masterPass = "";

    // Checkbox Tasarımı
    document.addEventListener('change', (e) => {
        if(e.target.type === 'checkbox') e.target.parentElement.classList.toggle('active', e.target.checked);
    });

    async function init() {
        if(!qrID) return;
        const q = query(collection(db, "karekodlar"), where("qr_id", "==", qrID));
        const snap = await getDocs(q);
        if(snap.empty) { alert("Geçersiz QR!"); return; }

        const qrDoc = snap.docs[0];
        currentQRRef = qrDoc.ref;
        const qrData = qrDoc.data();

        if(!qrData.servis_id) {
            document.getElementById('login-form').style.display = 'block';
        } else {
            servisArayuz(qrData);
        }
    }

    async function servisArayuz(qrData) {
        const sSnap = await getDoc(doc(db, "servisler", qrData.servis_id));
        const s = sSnap.data();
        masterPass = s.s_sifre;

        // Dükkan UI
        document.getElementById('d-logo').src = s.s_logo;
        document.getElementById('d-name').innerText = s.s_name;
        const social = document.getElementById('social-container');
        social.innerHTML = "";
        if(s.s_wp) social.innerHTML += `<a href="https://wa.me/${s.s_wp}" class="s-btn bg-wp"><i class="fab fa-whatsapp"></i></a>`;
        if(s.s_insta) social.innerHTML += `<a href="https://instagram.com/${s.s_insta}" class="s-btn bg-insta"><i class="fab fa-instagram"></i></a>`;
        if(s.s_konum) social.innerHTML += `<a href="${s.s_konum}" class="s-btn bg-map"><i class="fas fa-map-marker-alt"></i></a>`;

        if(qrData.plaka) {
            // Kayıtlı Araç: Geçmişi göster
            document.getElementById('customer-view').style.display = 'block';
            document.getElementById('v-plaka-display').innerText = qrData.plaka;
            document.getElementById('v-model-display').innerText = qrData.model || "";
            
            const list = document.getElementById('history-list');
            (qrData.servisler || []).reverse().forEach(ser => {
                list.innerHTML += `
                    <div class="card history-item">
                        <div class="h-date"><span>${ser.tarih}</span><span style="opacity:0.5; font-size:10px">#${qrID}</span></div>
                        <div class="h-km">${ser.km.toLocaleString()} KM</div>
                        <div class="h-tags">${(ser.islemler || []).map(i => `<span class="tag">${i}</span>`).join('')}</div>
                        ${ser.not ? `<p style="font-size:13px; margin-top:8px; color:#475569">${ser.not}</p>` : ''}
                    </div>`;
            });
        } else {
            // İlk Kayıt: Direkt usta panelini hazırla
            document.getElementById('first-time-fields').style.display = 'block';
            document.getElementById('master-form').style.display = 'block';
        }
    }

    // USTA GİRİŞ KONTROLÜ
    document.getElementById('btn-open-master').onclick = () => {
        const p = prompt("Usta Şifresi:");
        if(p === masterPass) {
            document.getElementById('customer-view').style.display = 'none';
            document.getElementById('master-form').style.display = 'block';
            window.scrollTo(0,0);
        } else if(p !== null) { alert("Hatalı Şifre!"); }
    };

    // KAYDETME FONKSİYONU
    document.getElementById('btn-save').onclick = async () => {
        const km = parseInt(document.getElementById('v-km').value);
        if(!km) { alert("Lütfen güncel KM girin!"); return; }

        const selected = [];
        document.querySelectorAll('.opt-item input:checked').forEach(i => selected.push(i.value));

        const updateData = {
            servisler: arrayUnion({
                tarih: new Date().toLocaleDateString('tr-TR'),
                km: km,
                next_km: km + parseInt(document.getElementById('v-next-km').value),
                islemler: selected,
                not: document.getElementById('v-note').value
            })
        };

        // Eğer ilk kayıtsa plaka ve modeli de ekle
        const plakaInput = document.getElementById('v-plaka-input').value.toUpperCase();
        const modelInput = document.getElementById('v-model-input').value;
        if(plakaInput) {
            updateData.plaka = plakaInput;
            updateData.model = modelInput;
        }

        await updateDoc(currentQRRef, updateData);
        location.reload();
    };

    // İLK AKTİVASYON (ZİMMETLEME)
    document.getElementById('btn-assign').onclick = async () => {
        const user = document.getElementById('u-name').value;
        const pass = document.getElementById('u-pass').value;
        const sSnap = await getDoc(doc(db, "servisler", user));
        if(sSnap.exists() && sSnap.data().s_sifre === pass) {
            await updateDoc(currentQRRef, { servis_id: user });
            location.reload();
        } else { alert("Yetki Hatası!"); }
    };

    init();
</script>
</body>
</html>
