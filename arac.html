<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karekod Oto | Akıllı Servis Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --dark: #0f172a; --bg: #f8fafc; --success: #22c55e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding-bottom: 140px; color: var(--dark); }
        .container { max-width: 480px; margin: 0 auto; padding: 15px; }

        /* Header */
        .brand-header { text-align: center; padding: 25px; background: white; border-radius: 0 0 30px 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border-bottom: 3px solid var(--accent); }
        .logo-box { width: 80px; height: 80px; background: #f1f5f9; border-radius: 20px; margin: 0 auto 10px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* Araç Kartı */
        .vehicle-card { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(15,23,42,0.1); }
        .v-plaka { font-size: 28px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 8px; display: block; }
        .v-row { display: flex; justify-content: space-between; font-size: 14px; opacity: 0.9; }

        /* HIZLI SEÇENEKLER - DÜZELTİLDİ */
        .quick-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        .action-item { background: #fff; border: 2px solid #f1f5f9; padding: 10px; border-radius: 12px; font-size: 11px; font-weight: 700; display: flex; align-items: center; gap: 8px; cursor: pointer; height: 45px; overflow: hidden; }
        .action-item input { width: 16px; height: 16px; flex-shrink: 0; }
        .action-item:has(input:checked) { border-color: var(--accent); background: #f0f7ff; }

        /* Form & Kartlar */
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); margin-bottom: 15px; border: 1px solid #eee; }
        label { font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #f1f5f9; border-radius: 12px; margin-bottom: 12px; font-family: inherit; box-sizing: border-box; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 16px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--accent); color: white; }

        /* Geçmiş Kayıtlar */
        .history-card { background: white; border-radius: 18px; padding: 15px; margin-bottom: 12px; border-left: 5px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .task-badge { display: inline-block; background: #f1f5f9; color: #475569; padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; margin: 2px; }

        /* İLETİŞİM PANELİ - AKILLI GÖRÜNÜM */
        .contact-panel { position: fixed; bottom: 20px; left: 15px; right: 15px; background: white; border-radius: 22px; padding: 12px; box-shadow: 0 -5px 30px rgba(0,0,0,0.1); border: 1px solid #eee; z-index: 1000; display: none; }
        .contact-header { text-align: center; font-size: 10px; font-weight: 800; color: #94a3b8; margin-bottom: 10px; text-transform: uppercase; }
        .contact-grid { display: flex; gap: 10px; }
        .c-btn { flex: 1; height: 50px; border-radius: 14px; display: none; align-items: center; justify-content: center; text-decoration: none; color: white; font-size: 20px; }
        .c-btn.show { display: flex; }

        #screen-activation, #screen-main, #screen-add { display: none; }
        .visible { display: block !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <div class="logo-box" id="s-logo-area"><i class="fas fa-tools fa-lg text-muted"></i></div>
        <h2 id="s-name-disp" style="margin:0; font-size:18px;">Yükleniyor...</h2>
    </div>

    <div id="screen-activation">
        <div class="card">
            <h3>🚀 Sistem Kurulumu</h3>
            <label>LOGONUZU SEÇİN</label>
            <input type="file" id="logo-input" accept="image/*" style="display:none">
            <button class="btn" style="background:#f1f5f9; border:1px dashed #cbd5e1; margin-bottom:15px;" onclick="document.getElementById('logo-input').click()">Fotoğraf Seç</button>
            <p id="up-msg" style="font-size:11px; text-align:center; color:var(--accent);"></p>

            <label>SERVİS ADI</label><input type="text" id="reg-s-name">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label>WP/ARAMA NO</label><input type="tel" id="reg-s-wp" placeholder="905xx"></div>
                <div><label>INSTAGRAM</label><input type="text" id="reg-s-insta" placeholder="@kullanici"></div>
            </div>
            <hr style="border:0; border-top:1px solid #eee; margin:15px 0">
            <label>ARAÇ PLAKASI</label><input type="text" id="reg-plaka">
            <label>MARKA / MODEL</label><input type="text" id="reg-model">
            <button class="btn btn-primary" id="btn-activate">SİSTEMİ BAŞLAT</button>
        </div>
    </div>

    <div id="screen-main">
        <div class="vehicle-card">
            <span class="v-plaka" id="v-plaka">---</span>
            <div class="v-row">
                <span id="v-model">---</span>
                <span><i class="fas fa-tachometer-alt"></i> <span id="v-km">0</span> KM</span>
            </div>
        </div>

        <div class="card" style="padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:12px; font-weight:800; color:#64748b">MUAYENE TARİHİ:</span>
            <span id="v-muayene" style="font-weight:800; color:var(--accent)">Girilmedi</span>
        </div>

        <button class="btn btn-primary" id="btn-show-add"><i class="fas fa-plus-circle"></i> YENİ SERVİS KAYDI</button>
        <div id="history-list" style="margin-top:20px"></div>
    </div>

    <div id="screen-add" class="card">
        <h3>🔧 İşlem Detayları</h3>
        
        <label>YAPILAN İŞLEMLER</label>
        <div class="quick-actions">
            <div class="action-item"><input type="checkbox" class="task" value="Yağ Değişti"> Yağ Değişti</div>
            <div class="action-item"><input type="checkbox" class="task" value="Yağ Filtresi Değişti"> Yağ Filt. Değişti</div>
            <div class="action-item"><input type="checkbox" class="task" value="Hava Filtresi Değişti"> Hava Filt. Değişti</div>
            <div class="action-item"><input type="checkbox" class="task" value="Frenler Bakıldı"> Fren Bakıldı</div>
            <div class="action-item"><input type="checkbox" class="task" value="Zincir Yağlandı"> Zincir Yağlandı</div>
            <div class="action-item"><input type="checkbox" class="task" value="Sıvılar Tamamlandı"> Sıvı Kontrol</div>
            <div class="action-item"><input type="checkbox" class="task" value="Buji Değişti"> Buji Değişti</div>
            <div class="action-item"><input type="checkbox" class="task" value="Check-up Yapıldı"> Check-up</div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label>KM</label><input type="number" id="srv-km"></div>
            <div><label>MUAYENE</label><input type="date" id="srv-muayene"></div>
        </div>

        <label>ÖZEL NOT</label>
        <textarea id="srv-note" rows="3" placeholder="Parça markası vb."></textarea>
        
        <button class="btn btn-primary" id="btn-save-srv">KAYDI ONAYLA</button>
        <button class="btn" style="background:none; margin-top:5px" onclick="location.reload()">İPTAL</button>
    </div>
</div>

<div class="contact-panel" id="contact-panel">
    <div class="contact-header">Servis İletişim</div>
    <div class="contact-grid">
        <a href="#" id="c-call" class="c-btn" style="background:#334155"><i class="fas fa-phone"></i></a>
        <a href="#" id="c-wp" class="c-btn" style="background:#22c55e"><i class="fab fa-whatsapp"></i></a>
        <a href="#" id="c-insta" class="c-btn" style="background:#e1306c"><i class="fab fa-instagram"></i></a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDn179sk4QyEh7TYuoU1KXcaXtigqWus6I",
        authDomain: "servis-56e5d.firebaseapp.com",
        projectId: "servis-56e5d",
        storageBucket: "servis-56e5d.firebasestorage.app",
        messagingSenderId: "497738142821",
        appId: "1:497738142821:web:7b23a60815048fbe21228c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const qrID = params.get('id');
    const IMGBB_KEY = "0fd006aeed01a4802808abbfc44990ca";

    let logoUrl = "";

    document.getElementById('logo-input').onchange = async (e) => {
        const file = e.target.files[0];
        if(!file) return;
        document.getElementById('up-msg').innerText = "Yükleniyor...";
        const fd = new FormData(); fd.append("image", file);
        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, {method:"POST", body:fd});
        const r = await res.json();
        if(r.success) {
            logoUrl = r.data.url;
            document.getElementById('s-logo-area').innerHTML = `<img src="${logoUrl}">`;
            document.getElementById('up-msg').innerText = "✅ Yüklendi";
        }
    };

    async function start() {
        if(!qrID) return;
        const q = query(collection(db, "karekodlar"), where("qr_id", "==", qrID));
        const snap = await getDocs(q);

        if(!snap.empty) {
            const docRef = snap.docs[0].ref;
            const data = snap.docs[0].data();
            
            if(data.durum === "aktif") {
                showMain(data, docRef);
            } else {
                document.getElementById('screen-activation').classList.add('visible');
                document.getElementById('btn-activate').onclick = async () => {
                    await updateDoc(docRef, {
                        s_name: document.getElementById('reg-s-name').value,
                        s_logo: logoUrl,
                        s_wp: document.getElementById('reg-s-wp').value,
                        s_insta: document.getElementById('reg-s-insta').value,
                        plaka: document.getElementById('reg-plaka').value,
                        model: document.getElementById('reg-model').value,
                        durum: "aktif",
                        servisler: []
                    });
                    location.reload();
                };
            }
        }
    }

    function showMain(data, docRef) {
        document.getElementById('screen-main').classList.add('visible');
        document.getElementById('s-name-disp').innerText = data.s_name || "Servis Paneli";
        if(data.s_logo) document.getElementById('s-logo-area').innerHTML = `<img src="${data.s_logo}">`;
        document.getElementById('v-plaka').innerText = data.plaka;
        document.getElementById('v-model').innerText = data.model;

        // AKILLI BUTON KONTROLÜ
        const contactPanel = document.getElementById('contact-panel');
        let hasContact = false;

        if(data.s_wp) {
            document.getElementById('c-wp').href = `https://wa.me/${data.s_wp}`;
            document.getElementById('c-wp').classList.add('show');
            document.getElementById('c-call').href = `tel:${data.s_wp}`;
            document.getElementById('c-call').classList.add('show');
            hasContact = true;
        }
        if(data.s_insta && data.s_insta.trim() !== "") {
            document.getElementById('c-insta').href = `https://instagram.com/${data.s_insta.replace('@','')}`;
            document.getElementById('c-insta').classList.add('show');
            hasContact = true;
        }
        if(hasContact) contactPanel.classList.add('visible');

        // GEÇMİŞ LİSTELEME
        if(data.servisler && data.servisler.length > 0) {
            const list = [...data.servisler].sort((a,b) => new Date(b.tarih) - new Date(a.tarih));
            document.getElementById('v-km').innerText = list[0].km;
            if(list[0].muayene) document.getElementById('v-muayene').innerText = new Date(list[0].muayene).toLocaleDateString('tr-TR');

            const container = document.getElementById('history-list');
            list.forEach(s => {
                const div = document.createElement('div');
                div.className = "history-card";
                const badges = s.tasks ? s.tasks.map(t => `<span class="task-badge">${t}</span>`).join('') : '';
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:8px">
                        <b style="color:var(--accent)">${new Date(s.tarih).toLocaleDateString('tr-TR')}</b>
                        <b>${s.km} KM</b>
                    </div>
                    <div>${badges}</div>
                    ${s.note ? `<div style="font-size:13px; color:#64748b; margin-top:8px; border-top:1px dashed #eee; padding-top:5px">Not: ${s.note}</div>` : ''}
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('btn-show-add').onclick = () => {
            document.getElementById('screen-main').style.display = 'none';
            document.getElementById('screen-add').classList.add('visible');
        };

        document.getElementById('btn-save-srv').onclick = async () => {
            const tasks = Array.from(document.querySelectorAll('.task:checked')).map(t => t.value);
            const km = document.getElementById('srv-km').value;
            const muayene = document.getElementById('srv-muayene').value;
            const note = document.getElementById('srv-note').value;
            if(!km) return alert("KM giriniz!");

            await updateDoc(docRef, {
                servisler: arrayUnion({ tarih: new Date().toISOString(), km, muayene, note, tasks })
            });
            location.reload();
        };
    }
    start();
</script>
</body>
</html>
