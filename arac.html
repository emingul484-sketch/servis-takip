<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karekod Oto | Servis Takip</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #f1f5f9; }
        
        /* Dükkan Header */
        .header-area { text-align: center; padding: 10px 0; }
        .s-logo { width: 85px; height: 85px; border-radius: 20px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 3px solid white; margin-bottom: 10px; }
        .social-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .s-btn { width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 20px; transition: 0.3s; }
        .bg-wp { background: #22c55e; } .bg-insta { background: #e4405f; } .bg-map { background: #4285f4; }
        .s-btn:active { transform: scale(0.9); }

        /* Plaka Alanı */
        .plaka-header { background: var(--dark); color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .plaka-num { font-size: 32px; font-weight: 800; letter-spacing: 2px; display: block; }
        
        /* Hızlı Seçim Butonları */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .opt-item { background: #f1f5f9; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: 2.5px solid transparent; }
        .opt-item input { display: none; }
        .opt-item.active { background: #eff6ff; border-color: var(--accent); color: var(--accent); }

        /* Servis Listesi */
        .history-item { border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; position: relative; }
        .h-date { font-weight: 800; color: var(--accent); font-size: 14px; }
        .tag { background: #f1f5f9; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 800; margin-right: 4px; display: inline-block; margin-top: 5px; }

        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 14px; margin-bottom: 12px; font-family: inherit; box-sizing: border-box; font-size: 15px; }
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .btn-blue { background: var(--accent); color: white; }
        .btn-black { background: var(--dark); color: white; }

        #master-form, #customer-view, #custom-km-area, #first-time-fields, #login-form { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form" class="card" style="text-align:center; margin-top:50px;">
        <i class="fas fa-qrcode" style="font-size:40px; color:var(--accent); margin-bottom:15px"></i>
        <h2>QR Aktif Et</h2>
        <input type="text" id="u-name" placeholder="Servis Kullanıcı Adı">
        <input type="password" id="u-pass" placeholder="Şifre">
        <button id="btn-assign" class="btn-main btn-blue">SERVİSE BAĞLA</button>
    </div>

    <div id="app-content">
        <div class="header-area">
            <img id="d-logo" class="s-logo" src="">
            <h2 id="d-name" style="margin:0; font-size:20px">---</h2>
            <div class="social-bar" id="social-container">
                </div>
        </div>

        <div id="customer-view">
            <div class="plaka-header">
                <span class="plaka-num" id="v-plaka-display">---</span>
                <span id="v-model-display" style="opacity:0.8; font-size:14px; font-weight:600">---</span>
            </div>
            <h3 style="margin-left:5px"><i class="fas fa-history"></i> Servis Geçmişi</h3>
            <div id="history-list"></div>
            <button id="btn-open-master" class="btn-main btn-black" style="margin-top:20px">
                <i class="fas fa-plus-circle"></i> YENİ BAKIM EKLE (USTA)
            </button>
        </div>

        <div id="master-form" class="card">
            <div style="background:#fee2e2; color:#ef4444; padding:8px 12px; border-radius:10px; font-size:12px; font-weight:800; margin-bottom:15px; display:inline-block">
                <i class="fas fa-shield-alt"></i> YETKİLİ USTA PANELİ
            </div>

            <div id="first-time-fields">
                <label style="font-weight:800; font-size:11px; color:#94a3b8">İLK SEFERE ÖZEL: MÜŞTERİ & ARAÇ</label>
                <input type="text" id="v-plaka-input" placeholder="PLAKA (Örn: 34 ABC 123)">
                <input type="text" id="v-model-input" placeholder="MARKA / MODEL (Örn: Honda Forza 250)">
                <input type="tel" id="v-phone-input" placeholder="MÜŞTERİ TELEFON (Örn: 0532...)">
                <hr style="border:1px solid #f1f5f9; margin-bottom:15px">
            </div>

            <label style="font-weight:800; font-size:11px; color:#94a3b8">GÜNCEL DURUM</label>
            <input type="number" id="v-km" placeholder="GÜNCEL KM">

            <div class="options-grid">
                <label class="opt-item"><input type="checkbox" value="Yağ Değişimi"> Yağ Değişimi</label>
                <label class="opt-item"><input type="checkbox" value="Hava Filtresi"> Hava Filtresi</label>
                <label class="opt-item"><input type="checkbox" value="Fren Bakımı"> Fren Bakımı</label>
                <label class="opt-item"><input type="checkbox" value="Varyatör Temizliği"> Varyatör</label>
                <label class="opt-item"><input type="checkbox" value="Zincir Bakımı"> Zincir / Kayış</label>
                <label class="opt-item"><input type="checkbox" value="Genel Kontrol"> Genel Bakım</label>
            </div>

            <label style="font-weight:800; font-size:11px; color:#94a3b8">BİR SONRAKİ BAKIM</label>
            <select id="v-next-km-select">
                <option value="2500">2.500 KM Sonra</option>
                <option value="5000" selected>5.000 KM Sonra</option>
                <option value="10000">10.000 KM Sonra</option>
                <option value="custom">-- ÖZEL KM GİR --</option>
            </select>
            <input type="number" id="v-next-km-custom" placeholder="Geleceği KM'yi Yazın" style="display:none">

            <textarea id="v-note" rows="2" placeholder="Usta notu..."></textarea>
            
            <button id="btn-save" class="btn-main btn-blue">KAYDI SİSTEME İŞLE</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#94a3b8; width:100%; margin-top:15px; font-weight:700; cursor:pointer">Vazgeç</button>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const qrID = new URLSearchParams(window.location.search).get('id');

    let currentQRRef = null;
    let masterPass = "";

    // Dinamik Arayüz Kontrolleri
    document.addEventListener('change', (e) => {
        if(e.target.type === 'checkbox') e.target.parentElement.classList.toggle('active', e.target.checked);
        if(e.target.id === 'v-next-km-select') {
            document.getElementById('v-next-km-custom').style.display = (e.target.value === 'custom' ? 'block' : 'none');
        }
    });

    async function baslat() {
        if(!qrID) return;
        const q = query(collection(db, "karekodlar"), where("qr_id", "==", qrID));
        const snap = await getDocs(q);
        
        if(snap.empty) { alert("QR Tanımsız!"); return; }
        
        currentQRRef = snap.docs[0].ref;
        const qrData = snap.docs[0].data();

        if(!qrData.servis_id) {
            document.getElementById('login-form').style.display = 'block';
        } else {
            arayuzYukle(qrData);
        }
    }

    async function arayuzYukle(qrData) {
        const sSnap = await getDoc(doc(db, "servisler", qrData.servis_id));
        const s = sSnap.data();
        masterPass = s.s_sifre;

        // Dükkan Bilgileri & Konum Butonları
        document.getElementById('d-logo').src = s.s_logo;
        document.getElementById('d-name').innerText = s.s_name;
        
        const social = document.getElementById('social-container');
        social.innerHTML = "";
        if(s.s_wp) social.innerHTML += `<a href="https://wa.me/${s.s_wp}" class="s-btn bg-wp"><i class="fab fa-whatsapp"></i></a>`;
        if(s.s_insta) social.innerHTML += `<a href="https://instagram.com/${s.s_insta}" class="s-btn bg-insta"><i class="fab fa-instagram"></i></a>`;
        if(s.s_konum) social.innerHTML += `<a href="${s.s_konum}" target="_blank" class="s-btn bg-map"><i class="fas fa-map-marker-alt"></i></a>`;

        if(qrData.plaka) {
            document.getElementById('customer-view').style.display = 'block';
            document.getElementById('v-plaka-display').innerText = qrData.plaka;
            document.getElementById('v-model-display').innerText = qrData.model || "";
            document.getElementById('first-time-fields').style.display = 'none';
            
            const list = document.getElementById('history-list');
            (qrData.servisler || []).reverse().forEach(ser => {
                list.innerHTML += `
                    <div class="card history-item">
                        <div class="h-date">${ser.tarih}</div>
                        <div style="font-weight:800; font-size:15px; margin:5px 0;">${ser.km.toLocaleString()} KM</div>
                        <div>${(ser.islemler || []).map(i => `<span class="tag">${i}</span>`).join('')}</div>
                        ${ser.not ? `<p style="font-size:13px; color:#475569; margin-top:10px">${ser.not}</p>` : ''}
                    </div>`;
            });
        } else {
            // Hiç plaka yoksa direkt usta girişi gibi formu aç
            document.getElementById('master-form').style.display = 'block';
            document.getElementById('first-time-fields').style.display = 'block';
        }
    }

    // Usta Giriş Butonu
    document.getElementById('btn-open-master').onclick = () => {
        const p = prompt("Servis Şifresini Girin:");
        if(p === masterPass) {
            document.getElementById('customer-view').style.display = 'none';
            document.getElementById('master-form').style.display = 'block';
            window.scrollTo(0,0);
        } else if(p !== null) { alert("Şifre Yanlış!"); }
    };

    // Kayıt Tamamlama
    document.getElementById('btn-save').onclick = async () => {
        const km = parseInt(document.getElementById('v-km').value);
        if(!km) return alert("Lütfen mevcut KM giriniz!");

        const nextVal = document.getElementById('v-next-km-select').value;
        const nextOffset = nextVal === 'custom' ? parseInt(document.getElementById('v-next-km-custom').value) : parseInt(nextVal);

        const checks = [];
        document.querySelectorAll('.opt-item input:checked').forEach(i => checks.push(i.value));

        const updateData = {
            servisler: arrayUnion({
                tarih: new Date().toLocaleDateString('tr-TR'),
                km: km,
                next_km: km + (nextOffset || 0),
                islemler: checks,
                not: document.getElementById('v-note').value
            })
        };

        // İlk Kayıt Verileri
        const plakaVal = document.getElementById('v-plaka-input').value.toUpperCase();
        if(plakaVal) {
            updateData.plaka = plakaVal;
            updateData.model = document.getElementById('v-model-input').value;
            updateData.musteri_tel = document.getElementById('v-phone-input').value;
        }

        await updateDoc(currentQRRef, updateData);
        location.reload();
    };

    // QR'ı Servise Tanımlama (Aktivasyon)
    document.getElementById('btn-assign').onclick = async () => {
        const user = document.getElementById('u-name').value;
        const pass = document.getElementById('u-pass').value;
        const sSnap = await getDoc(doc(db, "servisler", user));
        if(sSnap.exists() && sSnap.data().s_sifre === pass) {
            await updateDoc(currentQRRef, { servis_id: user });
            location.reload();
        } else { alert("Hatalı Kullanıcı veya Şifre!"); }
    };

    baslat();
</script>
</body>
</html>
