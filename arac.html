<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Karekod Oto | Dijital Bakım Kartı</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --text: #0f172a; --success: #22c55e; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); }
        .container { max-width: 500px; margin: 0 auto; padding: 15px; box-sizing: border-box; }
        .card { background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #f1f5f9; }
        
        /* Header & Sosyal */
        .header-area { text-align: center; padding: 10px 0; }
        .s-logo { width: 90px; height: 90px; border-radius: 22px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 10px; border: 3px solid white; }
        .social-bar { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .s-btn { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; text-decoration: none; font-size: 20px; transition: 0.3s; }
        .bg-wp { background: #22c55e; } .bg-insta { background: #e4405f; } .bg-map { background: #4285f4; }
        .s-btn:active { transform: scale(0.9); }

        /* Seçenek Butonları */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .opt-item { background: #f1f5f9; padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 700; cursor: pointer; border: 2.5px solid transparent; }
        .opt-item input { display: none; }
        .opt-item.active { background: #eff6ff; border-color: var(--accent); color: var(--accent); }

        /* Geçmiş Kayıtlar */
        .history-item { border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; }
        .history-date { font-weight: 800; font-size: 14px; color: var(--accent); display: flex; justify-content: space-between; }
        .history-km { font-size: 12px; color: #64748b; font-weight: 600; margin-top: 2px; }
        .history-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .tag { background: #f1f5f9; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 800; color: #475569; }

        /* Form Elemanları */
        label { display: block; font-weight: 800; margin-bottom: 6px; font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 14px; margin-bottom: 15px; font-family: inherit; font-size: 15px; box-sizing: border-box; }
        input:focus { border-color: var(--accent); outline: none; background: #fff; }
        
        .btn-main { width: 100%; padding: 18px; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
        .btn-dark { background: #0f172a; color: white; }

        #login-form, #register-form, #history-view { display: none; }
        .admin-lock { background: #fef2f2; color: #ef4444; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; margin-bottom: 15px; display: inline-flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form" class="card" style="text-align:center; margin-top:50px;">
        <i class="fas fa-lock" style="font-size:40px; color:var(--accent); margin-bottom:15px"></i>
        <h2>Servis Aktivasyonu</h2>
        <p style="color:#64748b; font-size:14px">Bu QR'ı dükkanınıza tanımlamak için giriş yapın.</p>
        <input type="text" id="u-name" placeholder="Kullanıcı Adı">
        <input type="password" id="u-pass" placeholder="Şifre">
        <button id="btn-assign" class="btn-main btn-primary">DÜKKANA BAĞLA</button>
    </div>

    <div id="app-content">
        <div class="header-area">
            <img id="d-logo" class="s-logo" src="">
            <h2 id="d-name" style="margin:0">---</h2>
            <div class="social-bar" id="social-container"></div>
        </div>

        <div id="history-view">
            <div class="card" style="text-align:center; background: var(--accent); color:white; border:none;">
                <h3 id="v-plaka-display" style="margin:0; font-size:26px; letter-spacing:1px">---</h3>
                <p id="v-model-display" style="margin:5px 0 0; opacity:0.9; font-weight:600">---</p>
            </div>
            
            <h3 style="margin: 20px 0 15px 5px;"><i class="fas fa-history"></i> Servis Geçmişi</h3>
            <div id="history-list"></div>

            <button id="btn-open-register" class="btn-main btn-dark" style="margin-top:20px;">
                <i class="fas fa-plus-circle"></i> YENİ SERVİS KAYDI EKLE
            </button>
        </div>

        <div id="register-form" class="card" style="margin-top:10px;">
            <div class="admin-lock"><i class="fas fa-user-shield"></i> USTA KAYIT PANELİ</div>
            
            <label>Araç Bilgileri</label>
            <input type="text" id="v-plaka" placeholder="PLAKA">
            <input type="text" id="v-model" placeholder="MARKA / MODEL">
            <input type="number" id="v-km" placeholder="GÜNCEL KM">

            <label>Yapılan İşlemler</label>
            <div class="options-grid">
                <label class="opt-item"><input type="checkbox" value="Yağ Değişimi"> Yağ Değişimi</label>
                <label class="opt-item"><input type="checkbox" value="Hava Filtresi"> Hava Filtresi</label>
                <label class="opt-item"><input type="checkbox" value="Yağ Filtresi"> Yağ Filtresi</label>
                <label class="opt-item"><input type="checkbox" value="Fren Bakımı"> Fren Bakımı</label>
                <label class="opt-item"><input type="checkbox" value="Buji Değişimi"> Buji Değişimi</label>
                <label class="opt-item"><input type="checkbox" value="Zincir Bakımı"> Zincir / Kayış</label>
            </div>

            <label>Sonraki Bakım Mesafesi</label>
            <select id="v-next-km">
                <option value="5000">5.000 KM Sonra</option>
                <option value="10000" selected>10.000 KM Sonra</option>
            </select>

            <label>Usta Notu</label>
            <textarea id="v-note" rows="2" placeholder="Yapılan diğer işlemler..."></textarea>
            
            <button id="btn-save" class="btn-main btn-primary">KAYDI SİSTEME KAYDET</button>
            <button onclick="location.reload()" style="background:none; border:none; color:#94a3b8; width:100%; margin-top:15px; font-weight:700">İptal Et</button>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, query, where, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const qrID = params.get('id');

    let currentQRRef = null;
    let masterSifre = ""; // Güvenlik kontrolü için

    // UI Kontrolleri
    document.addEventListener('change', (e) => {
        if(e.target.type === 'checkbox') {
            e.target.parentElement.classList.toggle('active', e.target.checked);
        }
    });

    async function baslat() {
        const q = query(collection(db, "karekodlar"), where("qr_id", "==", qrID));
        const snap = await getDocs(q);
        if(snap.empty) return;

        const qrDoc = snap.docs[0];
        currentQRRef = qrDoc.ref;
        const qrData = qrDoc.data();

        if(!qrData.servis_id) {
            document.getElementById('login-form').style.display = 'block';
        } else {
            servisYukle(qrData.servis_id, qrData);
        }
    }

    async function servisYukle(sID, qrData) {
        const sSnap = await getDoc(doc(db, "servisler", sID));
        const s = sSnap.data();
        masterSifre = s.s_sifre; // Şifreyi hafızaya al

        document.getElementById('d-logo').src = s.s_logo;
        document.getElementById('d-name').innerText = s.s_name;
        
        // Butonlar
        const social = document.getElementById('social-container');
        social.innerHTML = "";
        if(s.s_wp) social.innerHTML += `<a href="https://wa.me/${s.s_wp}" class="s-btn bg-wp"><i class="fab fa-whatsapp"></i></a>`;
        if(s.s_insta) social.innerHTML += `<a href="https://instagram.com/${s.s_insta}" class="s-btn bg-insta"><i class="fab fa-instagram"></i></a>`;
        if(s.s_konum) social.innerHTML += `<a href="${s.s_konum}" class="s-btn bg-map"><i class="fas fa-map-marker-alt"></i></a>`;

        // Geçmiş Listesi
        if(qrData.plaka) {
            document.getElementById('history-view').style.display = 'block';
            document.getElementById('v-plaka-display').innerText = qrData.plaka;
            document.getElementById('v-model-display').innerText = qrData.model || "";
            
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            (qrData.servisler || []).reverse().forEach(ser => {
                list.innerHTML += `
                    <div class="card history-item">
                        <div class="history-date">
                            <span>${ser.tarih}</span>
                            <span style="font-size:10px; opacity:0.6">#${qrID}</span>
                        </div>
                        <div class="history-km">${ser.km.toLocaleString()} KM</div>
                        <div class="history-tags">
                            ${(ser.islemler || []).map(i => `<span class="tag">${i}</span>`).join('')}
                        </div>
                        ${ser.not ? `<p style="font-size:13px; margin:10px 0 0; color:#475569; line-height:1.4">${ser.not}</p>` : ''}
                    </div>`;
            });
        } else {
            // Eğer araç hiç kayıtlı değilse direkt kayıt formunu aç (Ama önce şifre soracak)
            document.getElementById('btn-open-register').click();
        }
    }

    // ŞİFRE KORUMALI KAYIT AÇMA
    document.getElementById('btn-open-register').onclick = () => {
        const girilenSifre = prompt("Lütfen servis şifresini giriniz:");
        if(girilenSifre === masterSifre) {
            document.getElementById('history-view').style.display = 'none';
            document.getElementById('register-form').style.display = 'block';
            window.scrollTo(0,0);
        } else if(girilenSifre !== null) {
            alert("Hatalı şifre! Sadece yetkili servis kayıt ekleyebilir.");
        }
    };

    // KAYIT KAYDETME
    document.getElementById('btn-save').onclick = async () => {
        const plaka = document.getElementById('v-plaka').value.trim().toUpperCase();
        const km = parseInt(document.getElementById('v-km').value);
        if(!plaka || !km) { alert("Plaka ve KM zorunludur!"); return; }

        const checks = [];
        document.querySelectorAll('.opt-item input:checked').forEach(i => checks.push(i.value));

        await updateDoc(currentQRRef, {
            plaka: plaka,
            model: document.getElementById('v-model').value,
            servis_id: (await getDoc(currentQRRef)).data().servis_id, // Mevcut servis_id'yi koru
            servisler: arrayUnion({
                tarih: new Date().toLocaleDateString('tr-TR'),
                km: km,
                next_km: km + parseInt(document.getElementById('v-next-km').value),
                islemler: checks,
                not: document.getElementById('v-note').value
            })
        });
        location.reload();
    };

    // İLK AKTİVASYON (BAĞLAMA)
    document.getElementById('btn-assign').onclick = async () => {
        const user = document.getElementById('u-name').value;
        const pass = document.getElementById('u-pass').value;
        const sSnap = await getDoc(doc(db, "servisler", user));
        if(sSnap.exists() && sSnap.data().s_sifre === pass) {
            await updateDoc(currentQRRef, { servis_id: user });
            location.reload();
        } else { alert("Yetkisiz kullanıcı!"); }
    };

    baslat();
</script>
</body>
</html>
