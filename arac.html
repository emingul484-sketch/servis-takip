<label>SONRAKİ BAKIM ÖNERİSİ</label>
<select id="next-km-select" style="width:100%; padding:12px; border-radius:12px; border:1.5px solid #eee; margin-bottom:15px">
    <option value="5000">5.000 KM Sonra</option>
    <option value="10000" selected>10.000 KM Sonra</option>
</select>

<script type="module">
    // ... Firebase init (config.js'den) ...

    // Kayıt butonuna basıldığında:
    const currentKm = parseInt(document.getElementById('srv-km').value);
    const offset = parseInt(document.getElementById('next-km-select').value);
    const nextKm = currentKm + offset;

    await updateDoc(docRef, {
        servisler: arrayUnion({
            tarih: new Date().toISOString(),
            km: currentKm,
            next_km: nextKm, // Servis panelinde görünecek kritik veri
            tasks: secilenIslemler,
            note: document.getElementById('srv-note').value
        })
    });
</script>
