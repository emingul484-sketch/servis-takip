<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-BAKIM AJANDASI | PRO</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }

        /* Admin & Card Styles */
        .card { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--blue); margin: 0; font-size: 24px; font-weight: 800; }
        
        /* Form Elements */
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #64748b; }
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; outline: none; font-size: 15px; background: #fff; }
        
        /* Bakım Seçenekleri Grid */
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .check-item { display: flex; align-items: center; background: #f1f5f9; padding: 10px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent; }
        .check-item input { width: auto; margin-right: 10px; margin-bottom: 0; cursor: pointer; }
        .check-item:hover { border-color: var(--blue); }

        /* Plaka Tasarımı */
        .plate { background: #fff; border: 2.5px solid #333; display: inline-flex; border-radius: 6px; font-weight: 800; overflow: hidden; margin-bottom: 15px; }
        .tr-blue { background: #003399; color: #fff; padding: 5px 8px; font-size: 12px; display: flex; align-items: center; }
        .plate-no { padding: 5px 15px; font-size: 22px; color: #000; letter-spacing: 1px; }

        .btn { background: var(--blue); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; }
        .btn:active { transform: scale(0.98); }

        #qr-results { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .qr-box { background: #fff; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid var(--border); }

        @media print { .no-print { display: none; } .container { max-width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>DIJİTAL AJANDA</h1>
        <p style="font-size: 13px; color: #64748b;">Araç Bakım Takip Sistemi</p>
    </div>

    <div id="admin-area" class="hidden no-print">
        <div class="card">
            <h3 style="margin-top:0">Toplu Karekod Üret</h3>
            <label>Kaç Adet Üretilecek?</label>
            <input type="number" id="qr-count" placeholder="Örn: 10">
            <button class="btn" onclick="generateQRs()">KAREKODLARI OLUŞTUR</button>
        </div>
        <div id="qr-results"></div>
    </div>

    <div id="ajanda-area" class="hidden">
        
        <div id="view-mode" class="hidden">
            <div class="card" style="text-align:center;">
                <div class="plate"><div class="tr-blue">TR</div><div id="v-plate" class="plate-no">---</div></div>
                <h2 id="v-title" style="margin:5px 0;">MARKA MODEL</h2>
                <div style="display:flex; justify-content:space-around; background:#f1f5f9; padding:15px; border-radius:12px; margin:15px 0;">
                    <div><small>SON KM</small><div id="v-km" style="font-weight:800;">0</div></div>
                    <div><small>HEDEF KM</small><div id="v-nkm" style="font-weight:800; color:var(--blue);">0</div></div>
                </div>
                <div id="history-list" style="text-align:left;"></div>
                <button class="btn" style="margin-top:15px;" onclick="openForm()">YENİ KAYIT GİRİŞİ</button>
            </div>
        </div>

        <div id="form-mode" class="hidden">
            <div class="card">
                <h3 style="color:var(--blue); margin-top:0;">Bakım Bilgilerini Girin</h3>
                <label>Plaka</label><input type="text" id="f-plate" placeholder="34 ABC 123">
                <label>Araç Marka Model</label><input type="text" id="f-brand" placeholder="Örn: Renault Megane">
                <label>Kilometre</label><input type="number" id="f-km" placeholder="Şu anki KM">
                <label>Sonraki Bakım (KM)</label><input type="number" id="f-nkm" placeholder="Hedef KM">

                <label>Yapılan İşlemler (Hızlı Seçim)</label>
                <div class="checklist">
                    <label class="check-item"><input type="checkbox" value="Yağ Filtresi"> Yağ Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Hava Filtresi"> Hava Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Motor Yağı"> Motor Yağı</label>
                    <label class="check-item"><input type="checkbox" value="Polen Filtresi"> Polen Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Mazot Filtresi"> Mazot Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Fren Balatası"> Fren Balatası</label>
                    <label class="check-item"><input type="checkbox" value="Antifriz"> Antifriz</label>
                    <label class="check-item"><input type="checkbox" value="Silecekler"> Silecek Değişimi</label>
                </div>

                <label>Ekstra Notlar</label>
                <textarea id="f-desc" rows="3" placeholder="Diğer işlemler..."></textarea>
                
                <button class="btn" id="save-btn" onclick="saveAjanda()">AJANDAYA KAYDET</button>
                <button class="btn" style="background:none; color:#64748b; margin-top:10px;" onclick="location.reload()">Vazgeç</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase Bağlantısı
    const fbConfig = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(fbConfig);
    const database = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const carID = urlParams.get('id');

    // Panelleri Aç
    if (!carID) {
        document.getElementById('admin-area').classList.remove('hidden');
    } else {
        document.getElementById('ajanda-area').classList.remove('hidden');
        loadAjanda(carID);
    }

    function loadAjanda(id) {
        database.ref('ajanda/' + id).on('value', (snap) => {
            const data = snap.val();
            if (data && data.plaka) {
                document.getElementById('view-mode').classList.remove('hidden');
                document.getElementById('form-mode').classList.add('hidden');
                document.getElementById('v-plate').innerText = data.plaka;
                document.getElementById('v-title').innerText = data.marka;
                
                const list = document.getElementById('history-list');
                list.innerHTML = "<b>BAKIM GEÇMİŞİ</b>";
                
                if (data.kayitlar) {
                    const recs = Object.values(data.kayitlar).reverse();
                    document.getElementById('v-km').innerText = recs[0].km;
                    document.getElementById('v-nkm').innerText = recs[0].nkm;
                    recs.forEach(r => {
                        list.innerHTML += `<div style="padding:12px; background:#f8fafc; border-radius:10px; border-left:4px solid var(--blue); margin-top:10px; font-size:13px;">
                            <b style="color:var(--blue)">${r.tarih} - ${r.km} KM</b><br>${r.islem}</div>`;
                    });
                }
            } else {
                document.getElementById('form-mode').classList.remove('hidden');
            }
        });
    }

    function saveAjanda() {
        const plaka = document.getElementById('f-plate').value.trim().toUpperCase();
        const marka = document.getElementById('f-brand').value.trim();
        const km = document.getElementById('f-km').value;
        const nkm = document.getElementById('f-nkm').value;
        const note = document.getElementById('f-desc').value;

        let selected = [];
        document.querySelectorAll('.checklist input:checked').forEach(i => selected.push(i.value));
        const totalIslem = selected.join(', ') + (note ? " | " + note : "");

        if (!plaka || !km) { alert("Lütfen en az Plaka ve KM girin!"); return; }

        document.getElementById('save-btn').innerText = "Kaydediliyor...";

        const entry = {
            tarih: new Date().toLocaleDateString('tr-TR'),
            km: km,
            nkm: nkm,
            islem: totalIslem
        };

        database.ref('ajanda/' + carID).update({ plaka: plaka, marka: marka })
        .then(() => database.ref('ajanda/' + carID + '/kayitlar').push(entry))
        .then(() => { alert("BAŞARIYLA KAYDEDİLDİ"); location.reload(); });
    }

    function generateQRs() {
        const count = document.getElementById('qr-count').value;
        const output = document.getElementById('qr-results');
        output.innerHTML = "";
        const base = window.location.href.split('?')[0];
        const randomStart = Math.floor(Math.random() * 9000) + 1000;

        for (let i = 0; i < count; i++) {
            const id = "AJ" + (randomStart + i);
            const div = document.createElement('div');
            div.className = "qr-box";
            div.innerHTML = `<div id="q-${id}"></div><br><b>ID: ${id}</b>`;
            output.appendChild(div);
            new QRCode(document.getElementById("q-"+id), { text: base + "?id=" + id, width: 120, height: 120 });
        }
    }

    function openForm() {
        document.getElementById('view-mode').classList.add('hidden');
        document.getElementById('form-mode').classList.remove('hidden');
    }
</script>
</body>
</html>
