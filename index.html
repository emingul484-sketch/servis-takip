<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oto Nabız | QR Üretici</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); padding: 20px; }
        
        .controls { 
            background: white; padding: 25px; border-radius: 20px; 
            max-width: 900px; margin: 0 auto 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .grid-inputs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; }

        .btn-group { display: flex; gap: 10px; }
        .btn-generate { flex: 2; background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .btn-zip { flex: 1; background: #10b981; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; display: none; }

        #print-area { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; justify-items: center;
        }

        /* STICKER TASARIMI - KARE FORMUNA YAKINLAŞTIRILDI */
        .sticker {
            width: 240px; /* Genişlik artırıldı */
            padding: 15px; 
            border-radius: 15px; 
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }
        
        .theme-white { background: #ffffff; color: #0f172a; border: 1px solid #e2e8f0; }
        .theme-dark { background: #0f172a; color: #ffffff; }
        .theme-blue { background: #2563eb; color: #ffffff; }
        .theme-gold { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #000; }

        .sticker-logo { width: 50px; height: 50px; object-fit: contain; margin-bottom: 8px; border-radius: 6px; background: white; padding: 2px; }
        .sticker-header { font-size: 12px; font-weight: 800; margin-bottom: 10px; width: 100%; }
        
        /* QR KUTUSU - KESİN KARE */
        .qr-wrapper { 
            background: white; 
            padding: 10px; 
            border-radius: 10px; 
            display: block;
            width: 160px; /* Kare olması için sabitlendi */
            height: 160px;
        }
        .qr-wrapper img, .qr-wrapper canvas { margin: 0 auto; width: 160px !important; height: 160px !important; }
        
        .sticker-footer { margin-top: 10px; font-size: 10px; font-weight: 700; }
        .sticker-id { font-size: 8px; opacity: 0.6; margin-top: 3px; }
        
        .download-btn { margin-top: 12px; font-size: 10px; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: 700; background: rgba(0,0,0,0.1); color: inherit; }

        @media print { .controls, .download-btn { display: none; } }
    </style>
</head>
<body>

<div class="controls">
    <h2 style="margin:0 0 20px 0;">🚀 Jet QR Üretici</h2>
    <div class="grid-inputs">
        <div>
            <label>Bayi Seçin</label>
            <select id="bayi-select"><option value="">Yükleniyor...</option></select>
        </div>
        <div>
            <label>Üretilecek Adet</label>
            <input type="number" id="qr-count" value="1" min="1">
        </div>
        <div>
            <label>Renk Teması</label>
            <select id="theme-select">
                <option value="theme-blue">Kurumsal Mavi</option>
                <option value="theme-white">Klasik Beyaz</option>
                <option value="theme-dark">Premium Siyah</option>
                <option value="theme-gold">Altın Seri</option>
            </select>
        </div>
    </div>
    <div class="btn-group">
        <button class="btn-generate" onclick="generateQRs()">ANINDA QR ÜRET</button>
        <button id="zip-btn" class="btn-zip" onclick="downloadAllAsZip()">TOPLU İNDİR (ZIP)</button>
    </div>
</div>

<div id="print-area"></div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let bayiler = {};

    async function bayileriYukle() {
        const snap = await getDocs(collection(db, "servisler"));
        const select = document.getElementById('bayi-select');
        select.innerHTML = '<option value="">Seçiniz...</option>';
        snap.forEach(doc => {
            bayiler[doc.id] = doc.data();
            select.innerHTML += `<option value="${doc.id}">${doc.data().s_name}</option>`;
        });
    }

    window.generateQRs = async () => {
        const bayiId = document.getElementById('bayi-select').value;
        if(!bayiId) return alert("Bayi seçin!");

        const count = parseInt(document.getElementById('qr-count').value);
        const theme = document.getElementById('theme-select').value;
        const area = document.getElementById('print-area');
        
        area.innerHTML = ""; // Eski üretilenleri temizle

        for(let i = 0; i < count; i++) {
            const id = `${bayiId}-${Date.now().toString().slice(-5)}${i}`;
            const targetURL = `https://emingul484-sketch.github.io/servis-takip/arac.html?id=${id}`;
            
            // Firebase Kayıt
            await setDoc(doc(db, "uretilmis_qrlar", id), { bayi_id: bayiId, tarih: new Date().toISOString() });

            const sticker = document.createElement('div');
            sticker.className = `sticker ${theme}`;
            sticker.id = `stk-${id}`;
            sticker.innerHTML = `
                ${bayiler[bayiId].s_logo ? `<img src="${bayiler[bayiId].s_logo}" class="sticker-logo">` : ''}
                <div class="sticker-header">${bayiler[bayiId].s_name.toUpperCase()}</div>
                <div class="qr-wrapper" id="qr-${id}"></div>
                <div class="sticker-footer">DİJİTAL SERVİS KARTI</div>
                <div class="sticker-id">ID: ${id}</div>
                <button class="download-btn" onclick="downloadSticker('stk-${id}', '${id}')">PNG İNDİR</button>
            `;
            area.appendChild(sticker);

            // QR Çizimi
            new QRCode(document.getElementById(`qr-${id}`), {
                text: targetURL,
                width: 160,
                height: 160,
                correctLevel: QRCode.CorrectLevel.H
            });
        }
        document.getElementById('zip-btn').style.display = "block";
    };

    // İNDİRME FONKSİYONU - %100 DOLU ÇIKMASI İÇİN GÜNCELLENDİ
    window.downloadSticker = async (divId, name) => {
        const element = document.getElementById(divId);
        const btn = element.querySelector('.download-btn');
        btn.style.display = "none"; // İndirirken butonu gizle

        // ÖNEMLİ: QRCode.js'in çizimi bitirmesi için 500ms bekliyoruz
        await new Promise(r => setTimeout(r, 500));

        const canvas = await html2canvas(element, { 
            useCORS: true, 
            scale: 2,
            backgroundColor: null // Şeffaf arka plan desteği
        });

        const link = document.createElement('a');
        link.download = `QR-${name}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
        
        btn.style.display = "block"; // Butonu geri getir
    };

    window.downloadAllAsZip = async () => {
        const zip = new JSZip();
        const stickers = document.querySelectorAll('.sticker');
        
        for (let sticker of stickers) {
            const id = sticker.id.replace('stk-', '');
            const btn = sticker.querySelector('.download-btn');
            btn.style.display = "none";
            
            await new Promise(r => setTimeout(r, 400));
            const canvas = await html2canvas(sticker, { useCORS: true, scale: 2 });
            const imgData = canvas.toDataURL("image/png").split(',')[1];
            zip.file(`QR-${id}.png`, imgData, {base64: true});
            btn.style.display = "block";
        }

        const content = await zip.generateAsync({type:"blob"});
        saveAs(content, `Toplu-QR-Paketi.zip`);
    };

    bayileriYukle();
</script>
</body>
</html>
