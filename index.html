<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SERVİS TAKİP | SMART QR</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
        :root { --gold: #d4af37; --dark: #0a0a0a; }
        
        .container { max-width: 500px; margin: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }

        /* Kart ve Input Tasarımları */
        .card { width: 100%; background: var(--dark); border: 1px solid var(--gold); border-radius: 25px; padding: 20px; box-shadow: 0 0 25px rgba(212, 175, 55, 0.2); margin-bottom: 20px; }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; padding: 15px; color: white; border-radius: 12px; margin-bottom: 12px; outline: none; font-size: 14px; }
        input:focus { border-color: var(--gold); }
        
        .btn-gold { background: linear-gradient(135deg, #d4af37, #f2d06b); color: #000; border: none; padding: 16px; width: 100%; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }

        /* Tik Kutucukları (Checklist) */
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .check-item { display: flex; align-items: center; background: #151515; padding: 10px; border-radius: 10px; border: 1px solid #222; font-size: 11px; cursor: pointer; }
        .check-item input { width: auto; margin-right: 8px; margin-bottom: 0; accent-color: var(--gold); }

        /* Plaka Görünümü */
        .plate-box { background: #fff; color: #000; display: inline-flex; border-radius: 6px; font-weight: 900; overflow: hidden; border: 2px solid #fff; margin-bottom: 15px; }
        .tr-blue { background: #003399; color: #fff; padding: 5px 8px; font-size: 12px; display: flex; align-items: center; }
        .plate-no { padding: 5px 15px; font-size: 22px; letter-spacing: 1px; }

        /* QR Üretim Alanı */
        #print-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 20px; }
        .qr-item { background: #fff; padding: 10px; border-radius: 10px; color: #000; text-align: center; font-size: 10px; font-weight: bold; }

        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="font-family:'Cinzel'; color:var(--gold); margin: 20px 0; letter-spacing: 2px;">SERVİS TAKİP</h1>

    <div id="production-panel" class="hidden" style="width: 100%;">
        <div class="card">
            <h2 style="font-size: 14px; color: var(--gold); margin-top: 0;">YENİ QR ETİKET ÜRETİMİ</h2>
            <input type="number" id="start-id" placeholder="Başlangıç No (Örn: 1)">
            <input type="number" id="end-id" placeholder="Bitiş No (Örn: 10)">
            <button class="btn-gold" onclick="generateQRs()">KAREKODLARI BAS</button>
        </div>
        <div id="print-area"></div>
    </div>

    <div id="main-panel" class="hidden" style="width: 100%;">
        
        <div id="view-section" class="hidden">
            <div class="card" style="text-align: center;">
                <div class="plate-box"><div class="tr-blue">TR</div><div id="v-plate" class="plate-no">---</div></div>
                <h3 id="v-brand" style="margin: 5px 0; text-transform: uppercase;">MARKA / MODEL</h3>
                
                <div style="display:flex; justify-content:space-around; margin-top:20px; background:#111; padding:15px; border-radius:15px;">
                    <div><small style="color:var(--gold)">SON KM</small><div id="v-km" style="font-weight:900;">0</div></div>
                    <div><small style="color:var(--gold)">GELECEK KM</small><div id="v-next-km" style="font-weight:900;">0</div></div>
                </div>
                
                <div id="v-history" style="margin-top:20px; text-align: left;"></div>
                <button class="btn-gold" onclick="openForm()">+ YENİ BAKIM EKLE</button>
            </div>
        </div>

        <div id="form-section" class="hidden">
            <div class="card">
                <h2 style="color:var(--gold); text-align:center; font-size:16px;">BAKIM KAYIT FORMU</h2>
                <input type="text" id="f-plate" placeholder="PLAKA (Örn: 34ABC123)">
                <input type="text" id="f-brand" placeholder="ARAÇ MARKA / MODEL">
                <input type="number" id="f-km" placeholder="ŞU ANKİ KİLOMETRE">
                <input type="number" id="f-next-km" placeholder="SONRAKİ BAKIM KİLOMETRESİ">

                <div class="checklist">
                    <label class="check-item"><input type="checkbox" value="Motor Yağı"> Motor Yağı</label>
                    <label class="check-item"><input type="checkbox" value="Yağ Filtresi"> Yağ Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Hava Filtresi"> Hava Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Polen Filtresi"> Polen Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Mazot Filtresi"> Mazot Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Antifriz"> Antifriz</label>
                    <label class="check-item"><input type="checkbox" value="Fren Balatası"> Fren Balatası</label>
                    <label class="check-item"><input type="checkbox" value="Silecek"> Silecek</label>
                </div>

                <textarea id="f-note" rows="3" placeholder="Diğer yapılan işlemler ve notlar..."></textarea>
                <button class="btn-gold" id="save-btn" onclick="saveData()">SİSTEME KAYDET</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#555; width:100%; margin-top:10px; cursor:pointer;">Vazgeç</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Firebase Yapılandırması
    const config = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(config);
    const database = firebase.database();

    // 2. Sayfa Modunu Belirle (Üretim mi? Kayıt mı?)
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (!id) {
        document.getElementById('production-panel').classList.remove('hidden');
    } else {
        document.getElementById('main-panel').classList.remove('hidden');
        checkData(id);
    }

    // 3. Veritabanı Kontrolü
    function checkData(carId) {
        database.ref('servis/' + carId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // ARAÇ KAYITLIYSA
                document.getElementById('view-section').classList.remove('hidden');
                document.getElementById('form-section').classList.add('hidden');
                
                document.getElementById('v-plate').innerText = data.plaka;
                document.getElementById('v-brand').innerText = data.marka;
                
                const historyList = document.getElementById('v-history');
                historyList.innerHTML = "";
                
                if (data.gecmis) {
                    const records = Object.values(data.gecmis).reverse();
                    document.getElementById('v-km').innerText = records[0].km;
                    document.getElementById('v-next-km').innerText = records[0].gelecek_km;
                    
                    records.forEach(r => {
                        historyList.innerHTML += `
                            <div style="background:#151515; padding:12px; border-radius:12px; margin-bottom:10px; border-left:3px solid var(--gold);">
                                <div style="font-weight:900; font-size:12px; color:var(--gold);">${r.tarih} - ${r.km} KM</div>
                                <div style="font-size:11px; margin-top:5px; color:#ccc;">${r.islem}</div>
                            </div>`;
                    });
                }
            } else {
                // ARAÇ BOŞSA (YENİ QR)
                document.getElementById('form-section').classList.remove('hidden');
            }
        }, (error) => {
            alert("Bağlantı Hatası: " + error.message);
        });
    }

    function openForm() {
        document.getElementById('view-section').classList.add('hidden');
        document.getElementById('form-section').classList.remove('hidden');
    }

    // 4. Veri Kaydetme
    function saveData() {
        const btn = document.getElementById('save-btn');
        const plaka = document.getElementById('f-plate').value.trim().toUpperCase();
        const marka = document.getElementById('f-brand').value.trim();
        const km = document.getElementById('f-km').value;
        const nkm = document.getElementById('f-next-km').value;
        const note = document.getElementById('f-note').value;
        const tarih = new Date().toLocaleDateString('tr-TR');

        let secilenler = [];
        document.querySelectorAll('.checklist input:checked').forEach(i => secilenler.push(i.value));
        let tumIslem = secilenler.join(', ') + (note ? " | " + note : "");

        if (!plaka || !km) { alert("Lütfen Plaka ve KM girin!"); return; }

        btn.disabled = true;
        btn.innerText = "KAYDEDİLİYOR...";

        database.ref('servis/' + id).update({
            plaka: plaka,
            marka: marka
        }).then(() => {
            return database.ref('servis/' + id + '/gecmis').push({
                tarih: tarih,
                km: km,
                gelecek_km: nkm,
                islem: tumIslem
            });
        }).then(() => {
            alert("KAYIT BAŞARILI!");
            location.reload();
        }).catch(err => {
            alert("Hata: " + err.message);
            btn.disabled = false;
            btn.innerText = "TEKRAR DENE";
        });
    }

    // 5. QR Üretimi
    function generateQRs() {
        const s = parseInt(document.getElementById('start-id').value);
        const e = parseInt(document.getElementById('end-id').value);
        const area = document.getElementById('print-area');
        area.innerHTML = "";
        const url = window.location.href.split('?')[0];

        for (let i = s; i <= e; i++) {
            const qrId = "QR" + i;
            const div = document.createElement('div');
            div.className = "qr-item";
            div.innerHTML = `<div id="q-${qrId}"></div><br>${qrId}`;
            area.appendChild(div);
            new QRCode(document.getElementById("q-" + qrId), {
                text: url + "?id=" + qrId,
                width: 110, height: 110
            });
        }
    }
</script>
</body>
</html>
