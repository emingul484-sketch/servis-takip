<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Bakım Defteri | Servis Takip</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2563eb; /* Modern Mavi */
            --bg: #f8fafc;      /* Çok Açık Gri/Beyaz */
            --card: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); }
        .container { max-width: 500px; margin: auto; padding: 20px; min-height: 100vh; }
        .hidden { display: none !important; }

        /* Başlık Alanı */
        .header { text-align: center; padding: 20px 0; margin-bottom: 20px; }
        .header h1 { font-size: 22px; font-weight: 800; color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: -0.5px; }
        .header p { font-size: 13px; color: #64748b; margin-top: 5px; }

        /* Kart Yapısı */
        .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        
        /* Form Elemanları */
        label { display: block; font-size: 12px; font-weight: 600; color: #64748b; margin-bottom: 6px; margin-left: 4px; }
        input, select, textarea { width: 100%; background: #fff; border: 1px solid var(--border); padding: 12px 16px; color: var(--text); border-radius: 10px; margin-bottom: 16px; outline: none; font-size: 15px; transition: all 0.2s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        
        /* Butonlar */
        .btn { background: var(--primary); color: #fff; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 15px; transition: opacity 0.2s; }
        .btn:active { opacity: 0.8; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #64748b; margin-top: 10px; }

        /* Plaka Görünümü (ebakimdefteri tarzı) */
        .plate-box { background: #fff; border: 2px solid #333; display: inline-flex; border-radius: 6px; font-weight: 800; overflow: hidden; margin-bottom: 15px; }
        .tr-side { background: #003399; color: #fff; padding: 5px 8px; font-size: 12px; display: flex; align-items: center; }
        .plate-text { padding: 5px 15px; font-size: 20px; color: #000; letter-spacing: 1px; }

        /* QR Üretim (Admin) */
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .qr-item { background: #fff; padding: 15px; border-radius: 12px; border: 1px solid var(--border); text-align: center; font-size: 11px; }

        /* Kayıt Geçmişi */
        .history-card { background: #fff; border-left: 4px solid var(--primary); padding: 15px; margin-top: 12px; border-radius: 10px; border: 1px solid var(--border); border-left-width: 4px; }
        .history-date { font-weight: 700; font-size: 13px; color: var(--primary); }
        .history-desc { font-size: 14px; margin-top: 5px; color: #334155; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>E-BAKIM DEFTERİ</h1>
        <p id="status-text">Dijital Servis Takip Sistemi</p>
    </div>

    <div id="panel-admin" class="hidden">
        <div class="card">
            <h3 style="margin-top:0; font-size:16px;">Seri Karekod Oluştur</h3>
            <label>Başlangıç No</label>
            <input type="number" id="adm-start" value="100">
            <label>Kaç Adet Üretilecek?</label>
            <input type="number" id="adm-count" value="10">
            <button class="btn" onclick="generateBatch()">KAREKODLARI OLUŞTUR</button>
        </div>
        <div id="qr-output" class="qr-grid"></div>
    </div>

    <div id="panel-service" class="hidden">
        
        <div id="section-view" class="hidden">
            <div class="card" style="text-align: center;">
                <div class="plate-box"><div class="tr-side">TR</div><div id="v-plate" class="plate-text">---</div></div>
                <h2 id="v-brand" style="margin:5px 0; font-size:18px;">Marka Model</h2>
                
                <div style="display:flex; justify-content:space-between; margin-top:20px; padding:15px; background:#f1f5f9; border-radius:12px;">
                    <div style="text-align:left;"><small>SON KM</small><div id="v-km" style="font-weight:800; font-size:16px;">0</div></div>
                    <div style="text-align:right;"><small>GELECEK KM</small><div id="v-nkm" style="font-weight:800; font-size:16px; color:var(--primary);">0</div></div>
                </div>
                
                <div id="v-history-list" style="text-align:left; margin-top:20px;"></div>
                
                <button class="btn" style="margin-top:20px;" onclick="showAddForm()">YENİ BAKIM KAYDI GİR</button>
            </div>
        </div>

        <div id="section-form" class="hidden">
            <div class="card">
                <h3 id="form-title" style="margin-top:0; color:var(--primary);">Araç Kayıt & Bakım</h3>
                
                <label>Araç Plakası</label>
                <input type="text" id="f-plate" placeholder="Örn: 34ABC123">
                
                <label>Araç Marka ve Model</label>
                <input type="text" id="f-brand" placeholder="Örn: Fiat Egea 1.3 Multijet">
                
                <label>Mevcut Kilometre</label>
                <input type="number" id="f-km" placeholder="Örn: 85000">
                
                <label>Gelecek Bakım Kilometresi</label>
                <input type="number" id="f-nkm" placeholder="Örn: 95000">
                
                <label>Yapılan İşlemler</label>
                <textarea id="f-desc" rows="4" placeholder="Yağ filtresi, hava filtresi, motor yağı değişti..."></textarea>
                
                <button class="btn" id="save-btn" onclick="saveToFirebase()">KAYDI SİSTEME İŞLE</button>
                <button class="btn btn-outline" onclick="location.reload()">Vazgeç</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Firebase Bağlantısı
    const fbConfig = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(fbConfig);
    const db = firebase.database();

    // 2. Sayfa Modu Kontrolü
    const urlParams = new URLSearchParams(window.location.search);
    const carID = urlParams.get('id');

    if (!carID) {
        // Admin Panelini Aç (QR Üretme)
        document.getElementById('panel-admin').classList.remove('hidden');
    } else {
        // Servis Panelini Aç (QR Sorgulama)
        document.getElementById('panel-service').classList.remove('hidden');
        loadVehicleData(carID);
    }

    // 3. Veri Yükleme
    function loadVehicleData(id) {
        db.ref('araclar/' + id).on('value', (snap) => {
            const data = snap.val();
            if (data) {
                // Kayıtlı Araç: Görüntüleme ekranını aç
                document.getElementById('section-view').classList.remove('hidden');
                document.getElementById('section-form').classList.add('hidden');
                
                document.getElementById('v-plate').innerText = data.plaka;
                document.getElementById('v-brand').innerText = data.marka;
                
                // Form alanlarını otomatik doldur (yeni kayıt eklerken kolaylık olsun)
                document.getElementById('f-plate').value = data.plaka;
                document.getElementById('f-brand').value = data.marka;

                const list = document.getElementById('v-history-list');
                list.innerHTML = "<b>BAKIM GEÇMİŞİ</b>";
                
                if (data.gecmis) {
                    const records = Object.values(data.gecmis).reverse();
                    document.getElementById('v-km').innerText = records[0].km + " KM";
                    document.getElementById('v-nkm').innerText = records[0].nkm + " KM";
                    
                    records.forEach(r => {
                        list.innerHTML += `
                            <div class="history-card">
                                <div class="history-date">${r.tarih} — ${r.km} KM</div>
                                <div class="history-desc">${r.islem}</div>
                                <div style="font-size:11px; color:#94a3b8; margin-top:5px;">Gelecek Bakım: ${r.nkm} KM</div>
                            </div>`;
                    });
                }
            } else {
                // Boş QR: Direkt formu aç
                document.getElementById('section-form').classList.remove('hidden');
                document.getElementById('status-text').innerText = "Yeni QR Tanımlama (" + id + ")";
            }
        });
    }

    // 4. Veri Kaydetme (QR Boşsa İçini Doldurma)
    function saveToFirebase() {
        const btn = document.getElementById('save-btn');
        const plaka = document.getElementById('f-plate').value.trim().toUpperCase();
        const marka = document.getElementById('f-brand').value.trim();
        const km = document.getElementById('f-km').value;
        const nkm = document.getElementById('f-nkm').value;
        const islem = document.getElementById('f-desc').value.trim();

        if (!plaka || !km) { alert("Lütfen Plaka ve KM bilgilerini doldurun!"); return; }

        btn.disabled = true;
        btn.innerText = "KAYDEDİLİYOR...";

        const yeniKayit = {
            tarih: new Date().toLocaleDateString('tr-TR'),
            km: km,
            nkm: nkm,
            islem: islem || "Genel Bakım"
        };

        // Ana araç bilgilerini güncelle ve geçmişe ekle
        db.ref('araclar/' + carID).update({
            plaka: plaka,
            marka: marka
        }).then(() => {
            return db.ref('araclar/' + carID + '/gecmis').push(yeniKayit);
        }).then(() => {
            alert("Kayıt Başarıyla Tamamlandı!");
            location.reload();
        }).catch(e => {
            alert("Hata: " + e.message);
            btn.disabled = false;
        });
    }

    // 5. Admin: QR Üretme Fonksiyonu
    function generateBatch() {
        const start = parseInt(document.getElementById('adm-start').value);
        const count = parseInt(document.getElementById('adm-count').value);
        const output = document.getElementById('qr-output');
        output.innerHTML = "";
        
        const baseUrl = window.location.href.split('?')[0];

        for (let i = 0; i < count; i++) {
            const currentID = "V" + (start + i);
            const wrapper = document.createElement('div');
            wrapper.className = "qr-item";
            wrapper.innerHTML = `<div id="qrc-${currentID}"></div><div style="margin-top:8px; font-weight:bold;">${currentID}</div>`;
            output.appendChild(wrapper);

            new QRCode(document.getElementById("qrc-" + currentID), {
                text: baseUrl + "?id=" + currentID,
                width: 120, height: 120
            });
        }
    }

    function showAddForm() {
        document.getElementById('section-view').classList.add('hidden');
        document.getElementById('section-form').classList.remove('hidden');
        document.getElementById('form-title').innerText = "Yeni Bakım Girişi";
    }
</script>

</body>
</html>
