<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Bakım | Pro Üretim Hattı</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --nardo: #6c757d; --dark: #121417; --blue: #0d6efd; 
            --red: #d63031; --bg: #f8f9fa; --card: #ffffff;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 1300px; margin: 0 auto; }

        /* Layout */
        .main-layout { display: grid; grid-template-columns: 1fr 380px; gap: 25px; }

        /* Sol Liste Penceresi */
        .window-card { background: var(--card); border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.04); border: 1px solid #eee; }
        .scroll-area { height: 400px; overflow-y: auto; margin-top: 20px; border: 1px solid #f1f1f1; border-radius: 12px; }
        
        table { width: 100%; border-collapse: collapse; }
        thead { position: sticky; top: 0; background: #fff; z-index: 5; }
        th { padding: 15px; text-align: left; font-size: 12px; color: var(--nardo); text-transform: uppercase; border-bottom: 2px solid #eee; }
        td { padding: 12px 15px; border-bottom: 1px solid #f8f9fa; }

        /* Sağ Panel */
        .side-panel { background: var(--dark); color: white; padding: 30px; border-radius: 20px; position: sticky; top: 20px; }
        .btn { border: none; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.3; width: 100%; margin-bottom: 10px; }
        .btn-primary { background: var(--blue); color: white; padding: 15px; }
        .btn-success { background: var(--green, #198754); color: white; height: 60px; font-size: 18px; margin-top: 15px; }
        
        /* Tema Seçici */
        .theme-selector { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
        .theme-opt { height: 40px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .theme-opt.active { border-color: white; transform: scale(1.1); }

        /* Baskı Kuyruğu */
        .queue-box { margin-top: 30px; background: white; border-radius: 20px; padding: 25px; border: 2px dashed #ced4da; }
        .queue-flex { display: flex; flex-wrap: wrap; gap: 15px; }
        .q-item { width: 100px; text-align: center; background: #f8f9fa; padding: 10px; border-radius: 10px; position: relative; border: 1px solid #eee; }
        .q-del { position: absolute; top: -8px; right: -8px; background: var(--red); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; }

        /* Sticker Maker */
        #sticker-maker { position: absolute; left: -9999px; }
        .stk-tpl { width: 400px; height: 550px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 35px; border: 15px solid #6c757d; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-layout">
        <div class="window-card">
            <h2 style="margin:0">Üretim Kayıtları</h2>
            <div class="scroll-area">
                <table>
                    <thead><tr><th>Seri No</th><th>Durum</th><th>İşlem</th></tr></thead>
                    <tbody id="qr-table-body"></tbody>
                </table>
            </div>
        </div>

        <div class="side-panel">
            <h3 style="margin:0">Hızlı Üretim</h3>
            <p style="font-size:12px; color:#888;">Üretilenler otomatik baskı kuyruğuna düşer.</p>
            <button class="btn btn-primary" id="gen1">+ 1 Adet Üret</button>
            <button class="btn btn-primary" style="background:#2c3e50" id="gen10">+ 10 Adet Üret</button>
            
            <h3 style="margin-top:25px; border-top:1px solid #333; pt:20px;">Sticker Teması</h3>
            <div class="theme-selector" id="themeSelector">
                <div class="theme-opt active" data-color="#6c757d" title="Nardo Gri" style="background:#6c757d"></div>
                <div class="theme-opt" data-color="#0d6efd" title="Safir Mavi" style="background:#0d6efd"></div>
                <div class="theme-opt" data-color="#d63031" title="Yarış Kırmızısı" style="background:#d63031"></div>
                <div class="theme-opt" data-color="#121417" title="Gece Siyahı" style="background:#121417"></div>
            </div>

            <button class="btn btn-success" id="downloadZipBtn">📦 PAKETİ İNDİR (ZIP)</button>
        </div>
    </div>

    <div class="queue-box">
        <h3 style="margin:0; margin-bottom:15px;">🖨️ Baskı Kuyruğu (<span id="q-count">0</span>)</h3>
        <div class="queue-flex" id="queue-grid"></div>
    </div>
</div>

<div id="sticker-maker"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDn179sk4QyEh7TYuoU1KXcaXtigqWus6I",
        authDomain: "servis-56e5d.firebaseapp.com",
        projectId: "servis-56e5d",
        storageBucket: "servis-56e5d.firebasestorage.app",
        messagingSenderId: "497738142821",
        appId: "1:497738142821:web:7b23a60815048fbe21228c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const siteUrl = "https://emingul484-sketch.github.io/servis-takip/arac.html?id=";
    let queue = [];
    let selectedTheme = "#6c757d";

    // Tema Seçimi
    document.querySelectorAll('.theme-opt').forEach(opt => {
        opt.onclick = () => {
            document.querySelectorAll('.theme-opt').forEach(x => x.classList.remove('active'));
            opt.classList.add('active');
            selectedTheme = opt.dataset.color;
        }
    });

    // Veri Dinleme
    onSnapshot(query(collection(db, "karekodlar"), orderBy("olusturma_tarihi", "desc")), (snapshot) => {
        const tbody = document.getElementById('qr-table-body');
        tbody.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const tr = document.createElement('tr');
            tr.innerHTML = `<td><b>${data.qr_id}</b></td><td>${data.durum.toUpperCase()}</td><td><button class="btn" style="width:auto; padding:5px 10px; background:#eee" onclick="addToQueue('${data.qr_id}')">+</button></td>`;
            tbody.appendChild(tr);
        });
    });

    // Üretim + Otomatik Kuyruğa Ekleme
    async function produce(n) {
        for(let i=0; i<n; i++) {
            const id = "EB" + Math.floor(100000 + Math.random() * 900000);
            await addDoc(collection(db, "karekodlar"), { qr_id: id, durum: "stokta", olusturma_tarihi: serverTimestamp() });
            addToQueue(id); // Üretildiği an kuyruğa at
        }
    }

    document.getElementById('gen1').onclick = () => produce(1);
    document.getElementById('gen10').onclick = () => produce(10);

    window.addToQueue = (id) => {
        if(!queue.includes(id)) {
            queue.push(id);
            renderQueue();
        }
    };

    window.removeFromQueue = (id) => {
        queue = queue.filter(x => x !== id);
        renderQueue();
    };

    function renderQueue() {
        const grid = document.getElementById('queue-grid');
        grid.innerHTML = "";
        document.getElementById('q-count').innerText = queue.length;
        queue.forEach(id => {
            const d = document.createElement('div');
            d.className = "q-item";
            d.innerHTML = `<button class="q-del" onclick="removeFromQueue('${id}')">×</button><div id="q-qr-${id}"></div><b style="font-size:10px">${id}</b>`;
            grid.appendChild(d);
            new QRCode(document.getElementById(`q-qr-${id}`), { text: siteUrl+id, width: 80, height: 80 });
        });
    }

    document.getElementById('downloadZipBtn').onclick = async () => {
        if(queue.length === 0) return alert("Kuyruk boş!");
        const zip = new JSZip();
        const m = document.getElementById('sticker-maker');
        for(let id of queue) {
            m.innerHTML = `<div id="tpl" class="stk-tpl" style="background:#1a1d21; border-color:${selectedTheme}">
                <h3 style="margin:0; border-bottom:3px solid ${selectedTheme}; width:100%; text-align:center; padding-bottom:10px;">ARAÇ BAKIM TAKİP</h3>
                <div id="tpl-qr" style="background:white; padding:15px; border-radius:10px;"></div>
                <h1 style="margin:0; background:${selectedTheme}; width:100%; text-align:center; padding:10px 0;">${id}</h1>
            </div>`;
            new QRCode(document.getElementById("tpl-qr"), { text: siteUrl+id, width: 280, height: 280 });
            await new Promise(r => setTimeout(r, 200));
            const canvas = await html2canvas(document.getElementById("tpl"));
            zip.file(`${id}.png`, canvas.toDataURL("image/png").split(',')[1], {base64: true});
        }
        const blob = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Bakim_Stickerlari_${selectedTheme}.zip`; a.click();
        queue = []; renderQueue();
    };
</script>
</body>
</html>
