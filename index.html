<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SERVİS TAKİP</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; text-align: center; }
        .container { padding: 20px; max-width: 500px; margin: auto; }
        .card { background: #0a0a0a; border: 1px solid #d4af37; border-radius: 20px; padding: 20px; margin-top: 20px; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        input, textarea { width: 100%; background: #111; border: 1px solid #333; padding: 12px; color: #fff; border-radius: 10px; margin-bottom: 10px; outline: none; }
        .btn { background: linear-gradient(135deg, #d4af37, #f2d06b); color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; }
        .hidden { display: none !important; }
        #debug-log { color: #ff4444; font-size: 10px; margin-top: 10px; text-align: left; background: #222; padding: 5px; border-radius: 5px; }
        
        /* Checklist */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .item { background: #151515; padding: 10px; border-radius: 8px; font-size: 12px; display: flex; align-items: center; border: 1px solid #222; }
        .item input { width: auto; margin-right: 8px; margin-bottom: 0; }
        
        /* QR Output */
        #qr-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
        .q-box { background: #fff; padding: 10px; border-radius: 5px; color: #000; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#d4af37; letter-spacing: 2px;">SERVİS TAKİP</h2>
    <div id="debug-log">Sistem başlatılıyor...</div>

    <div id="p-prod" class="hidden">
        <div class="card">
            <p>Karekod Seri Üretim</p>
            <input type="number" id="start" placeholder="Başlangıç ID">
            <input type="number" id="end" placeholder="Bitiş ID">
            <button class="btn" onclick="makeQR()">KAREKOD ÜRET</button>
        </div>
        <div id="qr-area"></div>
    </div>

    <div id="p-main" class="hidden">
        
        <div id="view" class="hidden">
            <div class="card">
                <h1 id="v-plaka" style="background:#fff; color:#000; display:inline-block; padding:5px 15px; border-radius:5px;">---</h1>
                <h3 id="v-marka">---</h3>
                <div style="display:flex; justify-content:space-around; margin:20px 0;">
                    <div><small>SON KM</small><div id="v-km" style="font-weight:900; color:#d4af37;">0</div></div>
                    <div><small>GELECEK</small><div id="v-nkm" style="font-weight:900; color:#d4af37;">0</div></div>
                </div>
                <div id="v-list" style="text-align:left;"></div>
                <button class="btn" onclick="showForm()" style="margin-top:15px;">+ YENİ BAKIM</button>
            </div>
        </div>

        <div id="form" class="hidden">
            <div class="card">
                <p>Bakım Kayıt Formu</p>
                <input type="text" id="f-plaka" placeholder="PLAKA">
                <input type="text" id="f-marka" placeholder="MARKA / MODEL">
                <input type="number" id="f-km" placeholder="ŞU ANKİ KM">
                <input type="number" id="f-nkm" placeholder="SONRAKİ BAKIM KM">
                
                <div class="grid">
                    <label class="item"><input type="checkbox" value="Motor Yağı"> Yağ</label>
                    <label class="item"><input type="checkbox" value="Yağ Filtresi"> Yağ F.</label>
                    <label class="item"><input type="checkbox" value="Hava Filtresi"> Hava F.</label>
                    <label class="item"><input type="checkbox" value="Polen Filtresi"> Polen F.</label>
                    <label class="item"><input type="checkbox" value="Antifriz"> Antifriz</label>
                    <label class="item"><input type="checkbox" value="Fren Balatası"> Balata</label>
                </div>
                <textarea id="f-not" placeholder="Ekstra işlemler..."></textarea>
                <button class="btn" id="s-btn" onclick="save()">KAYDET</button>
            </div>
        </div>
    </div>
</div>

<script>
    const log = (msg) => document.getElementById('debug-log').innerText = msg;

    try {
        const config = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(config);
        const db = firebase.database();
        log("Firebase bağlandı.");

        const url = new URLSearchParams(window.location.search);
        const id = url.get('id');

        if (!id) {
            document.getElementById('p-prod').classList.remove('hidden');
            log("Üretim modu aktif.");
        } else {
            document.getElementById('p-main').classList.remove('hidden');
            log("Araç ID okundu: " + id);
            
            db.ref('servis/' + id).on('value', (snap) => {
                const data = snap.val();
                if (data) {
                    log("Araç verisi bulundu.");
                    document.getElementById('view').classList.remove('hidden');
                    document.getElementById('form').classList.add('hidden');
                    document.getElementById('v-plaka').innerText = data.plaka;
                    document.getElementById('v-marka').innerText = data.marka;
                    
                    const list = document.getElementById('v-list');
                    list.innerHTML = "";
                    if (data.gecmis) {
                        const recs = Object.values(data.gecmis).reverse();
                        document.getElementById('v-km').innerText = recs[0].km;
                        document.getElementById('v-nkm').innerText = recs[0].nkm;
                        recs.forEach(r => {
                            list.innerHTML += `<div style="border-bottom:1px solid #222; padding:10px 0;">
                                <small style="color:#d4af37;">${r.tarih}</small><br>
                                <span style="font-size:12px;">${r.islem}</span></div>`;
                        });
                    }
                } else {
                    log("Bu QR henüz kaydedilmemiş. Form açılıyor...");
                    document.getElementById('form').classList.remove('hidden');
                }
            }, (err) => log("DB Hatası: " + err.message));
        }
    } catch (e) { log("Başlatma Hatası: " + e.message); }

    function showForm() {
        document.getElementById('view').classList.add('hidden');
        document.getElementById('form').classList.remove('hidden');
    }

    function save() {
        const plaka = document.getElementById('f-plaka').value.toUpperCase();
        const km = document.getElementById('f-km').value;
        const nkm = document.getElementById('f-nkm').value;
        const id = new URLSearchParams(window.location.search).get('id');

        let works = [];
        document.querySelectorAll('.grid input:checked').forEach(i => works.push(i.value));
        const fullWork = works.join(', ') + " " + document.getElementById('f-not').value;

        if (!plaka || !km) return alert("Eksik bilgi!");

        log("Kaydediliyor...");
        firebase.database().ref('servis/' + id).update({
            plaka: plaka,
            marka: document.getElementById('f-marka').value
        }).then(() => {
            return firebase.database().ref('servis/' + id + '/gecmis').push({
                tarih: new Date().toLocaleDateString('tr-TR'),
                km: km,
                nkm: nkm,
                islem: fullWork
            });
        }).then(() => {
            log("Başarıyla kaydedildi.");
            location.reload();
        }).catch(e => log("Kayıt Hatası: " + e.message));
    }

    function makeQR() {
        const s = document.getElementById('start').value;
        const e = document.getElementById('end').value;
        const area = document.getElementById('qr-area');
        area.innerHTML = "";
        const base = window.location.href.split('?')[0];

        for (let i = s; i <= e; i++) {
            const qrId = "S" + i;
            const d = document.createElement('div');
            d.className = "q-box";
            d.innerHTML = `<div id="q${qrId}"></div>${qrId}`;
            area.appendChild(d);
            new QRCode(document.getElementById("q"+qrId), { text: base + "?id=" + qrId, width: 90, height: 90 });
        }
    }
</script>
</body>
</html>
