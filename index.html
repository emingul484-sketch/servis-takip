<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Bakım Pro | Yönetim Paneli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root { 
            --nardo-gray: #6c757d; 
            --dark-metal: #212529;
            --accent-blue: #0d6efd;
            --bg: #f4f4f9;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 20px; color: var(--dark-metal); }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Dashboard Kartları */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #e1e1e1; }
        .stat-label { font-size: 14px; font-weight: 600; color: var(--nardo-gray); text-transform: uppercase; }
        .stat-val { font-size: 35px; font-weight: 800; margin-top: 10px; }

        /* Butonlar */
        .btn { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.3s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-generate { background: var(--dark-metal); color: white; width: 100%; }
        .btn-generate:hover { background: #000; }
        .btn-plus { background: var(--accent-blue); color: white; width: 40px; height: 40px; border-radius: 50%; padding: 0; }
        .btn-zip { background: #198754; color: white; padding: 15px 30px; font-size: 16px; }

        /* Tablo */
        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        th { text-align: left; padding: 15px; color: var(--nardo-gray); }
        td { background: white; padding: 15px; }
        td:first-child { border-radius: 10px 0 0 10px; }
        td:last-child { border-radius: 0 10px 10px 0; }

        /* Baskı Kuyruğu (Ön İzleme Alanı Çözümü) */
        #preview-section { margin-top: 50px; padding: 30px; background: #eaecf0; border-radius: 20px; }
        .queue-grid { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .preview-card { 
            background: #fff; width: 160px; padding: 15px; border-radius: 12px; 
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .preview-card .qr-preview { margin: 10px auto; width: 100px; height: 100px; }

        /* STICKER TEMASI (İndirilecek PNG Tasarımı) */
        #sticker-maker { position: absolute; left: -9999px; }
        .sticker-template { 
            width: 500px; height: 700px; background: #2c3e50; color: white;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 40px; box-sizing: border-box; font-family: 'Arial Black', sans-serif;
            border: 15px solid #bdc3c7; /* Nardo Gri Çerçeve */
        }
        .sticker-header { font-size: 32px; border-bottom: 4px solid #3498db; padding-bottom: 10px; width: 100%; text-align: center; }
        .sticker-qr-bg { background: white; padding: 20px; border-radius: 15px; }
        .sticker-footer { font-size: 40px; letter-spacing: 5px; background: #bdc3c7; color: #2c3e50; width: 100%; text-align: center; padding: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="margin-bottom: 30px; font-weight: 800;">⚙️ Bakım Takip <span style="color: var(--nardo-gray);">Panel</span></h1>

    <div class="dashboard">
        <div class="card"><div class="stat-label">Stoktaki Ürün</div><div class="stat-val" id="stock-count">0</div></div>
        <div class="card"><div class="stat-label">Aktif Araçlar</div><div class="stat-val" id="active-count" style="color:var(--accent-blue)">0</div></div>
        <div class="card" style="display:flex; align-items:center;"><button class="btn btn-generate" id="generateBtn">+ YENİ KOD OLUŞTUR</button></div>
    </div>

    <div class="card">
        <input type="text" id="searchInput" style="width:100%; padding:15px; border-radius:10px; border:1px solid #ddd; margin-bottom:20px;" placeholder="Seri No Ara...">
        <table>
            <thead><tr><th>SERİ NO</th><th>DURUM</th><th>İŞLEM</th></tr></thead>
            <tbody id="qr-table-body"></tbody>
        </table>
    </div>

    <div id="preview-section">
        <div style="display:flex; justify-content:space-between; align-items:center">
            <h2 style="margin:0">📦 Baskı Kuyruğu (<span id="queueCount">0</span>)</h2>
            <button class="btn btn-zip" id="downloadZipBtn">📥 STICKER PAKETİNİ İNDİR (ZIP)</button>
        </div>
        <div class="queue-grid" id="preview-grid"></div>
    </div>
</div>

<div id="sticker-maker"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, onSnapshot, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDn179sk4QyEh7TYuoU1KXcaXtigqWus6I",
        authDomain: "servis-56e5d.firebaseapp.com",
        projectId: "servis-56e5d",
        storageBucket: "servis-56e5d.firebasestorage.app",
        messagingSenderId: "497738142821",
        appId: "1:497738142821:web:7b23a60815048fbe21228c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const siteUrl = "https://emingul484-sketch.github.io/servis-takip/arac.html?id=";
    let baskiListesi = [];

    // Verileri Yükle
    onSnapshot(query(collection(db, "karekodlar"), orderBy("olusturma_tarihi", "desc")), (snapshot) => {
        const tableBody = document.getElementById('qr-table-body');
        tableBody.innerHTML = "";
        let sCount = 0, aCount = 0;

        snapshot.forEach((sDoc) => {
            const data = sDoc.data();
            data.durum === "stokta" ? sCount++ : aCount++;
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b>${data.qr_id}</b></td>
                <td><span style="font-weight:700; color:${data.durum === 'stokta' ? '#f39c12' : '#27ae60'}">${data.durum.toUpperCase()}</span></td>
                <td><button class="btn btn-plus" onclick="listeyeEkle('${data.qr_id}')">+</button></td>
            `;
            tableBody.appendChild(row);
        });
        document.getElementById('stock-count').innerText = sCount;
        document.getElementById('active-count').innerText = aCount;
    });

    window.listeyeEkle = (id) => {
        if(baskiListesi.includes(id)) return;
        baskiListesi.push(id);
        renderPreview();
    };

    function renderPreview() {
        const grid = document.getElementById('preview-grid');
        document.getElementById('queueCount').innerText = baskiListesi.length;
        grid.innerHTML = "";
        
        baskiListesi.forEach(id => {
            const div = document.createElement('div');
            div.className = "preview-card";
            div.innerHTML = `<div style="font-size:10px; font-weight:bold">ID: ${id}</div><div id="pre-${id}" class="qr-preview"></div>`;
            grid.appendChild(div);
            // QR'ı oluşturmak için kısa bir gecikme veriyoruz ki üst üste binmesin
            setTimeout(() => {
                new QRCode(document.getElementById(`pre-${id}`), { text: siteUrl + id, width: 100, height: 100 });
            }, 50);
        });
    }

    document.getElementById('generateBtn').onclick = async () => {
        const id = "EB" + Math.floor(1000 + Math.random() * 9000);
        await addDoc(collection(db, "karekodlar"), { qr_id: id, durum: "stokta", olusturma_tarihi: serverTimestamp() });
    };

    document.getElementById('downloadZipBtn').onclick = async () => {
        if(baskiListesi.length === 0) return alert("Liste boş!");
        const zip = new JSZip();
        const maker = document.getElementById('sticker-maker');
        
        for (let id of baskiListesi) {
            maker.innerHTML = `
                <div id="real-sticker" class="sticker-template">
                    <div class="sticker-header">ARAÇ BAKIM TAKİP</div>
                    <div class="sticker-qr-bg"><div id="real-qr"></div></div>
                    <div class="sticker-footer">${id}</div>
                </div>
            `;
            new QRCode(document.getElementById("real-qr"), { text: siteUrl + id, width: 300, height: 300, colorDark: "#2c3e50" });
            await new Promise(r => setTimeout(r, 200));
            const canvas = await html2canvas(document.getElementById("real-sticker"));
            zip.file(`${id}_PRESTIGE.png`, canvas.toDataURL("image/png").split(',')[1], {base64: true});
        }
        const content = await zip.generateAsync({type:"blob"});
        const a = document.createElement('a'); a.href = URL.createObjectURL(content); a.download = "E-Bakim_Stickers.zip"; a.click();
        baskiListesi = []; renderPreview();
    };
</script>
</body>
</html>
