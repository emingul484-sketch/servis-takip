<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servis Takip Sistemi</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #1e3a8a; --secondary: #3b82f6; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: var(--primary); margin-top: 0; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: var(--secondary); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--primary); }
        .record-item { border-left: 4px solid var(--secondary); background: #f1f5f9; padding: 10px; margin: 10px 0; border-radius: 4px; text-align: left; }
        .badge { background: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        @media print { .no-print { display: none; } }
        .qr-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="admin-panel" class="card no-print">
        <h2>QR Üretim Merkezi</h2>
        <input type="number" id="start-id" placeholder="Başlangıç No">
        <input type="number" id="end-id" placeholder="Bitiş No">
        <button onclick="topluUret()">Stickerları Hazırla ve Yazdır</button>
        <div id="print-area" class="qr-grid" style="margin-top:20px;"></div>
    </div>

    <div id="servis-panel" class="card" style="display:none;">
        <h2 id="vehicle-title">Araç Kaydı</h2>
        <div id="vehicle-info"></div>
        
        <hr>
        
        <div id="bakim-formu">
            <h3>Yeni Bakım Girişi</h3>
            <input type="text" id="plaka" placeholder="Plaka (İlk kayıtta zorunlu)">
            <input type="text" id="marka" placeholder="Marka / Model">
            <input type="number" id="mevcut-km" placeholder="Mevcut Kilometre">
            <input type="number" id="gelecek-km" placeholder="Gelecek Bakım Kilometresi">
            <select id="bakim-araligi">
                <option value="10000">10.000 KM Bakımı</option>
                <option value="15000">15.000 KM Bakımı</option>
                <option value="20000">20.000 KM Bakımı</option>
            </select>
            <textarea id="yapilanlar" placeholder="Yapılan işlemler (Yağ, hava filtresi, balata vb.)"></textarea>
            <button onclick="bakimKaydet()">KAYDET / GÜNCELLE</button>
        </div>

        <div id="gecmis-bakimlar">
            <h3>Bakım Geçmişi</h3>
            <div id="records-list"></div>
        </div>
    </div>
</div>

<script>
    // FIREBASE YAPILANDIRMASI
    const firebaseConfig = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const carId = urlParams.get('id');

    // SAYFA YÜKLENDİĞİNDE
    if (carId) {
        document.getElementById('admin-panel').style.display = 'none';
        document.getElementById('servis-panel').style.display = 'block';
        verileriGetir(carId);
    }

    function verileriGetir(id) {
        db.ref('servis_kayitlari/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('records-list');
            listDiv.innerHTML = "";
            
            if (data) {
                document.getElementById('vehicle-title').innerText = data.plaka + " - " + data.marka;
                document.getElementById('plaka').value = data.plaka;
                document.getElementById('marka').value = data.marka;
                
                // Kayıtları listele (Tarihe göre ters sırala)
                if(data.gecmis) {
                    Object.values(data.gecmis).reverse().forEach(record => {
                        listDiv.innerHTML += `
                            <div class="record-item">
                                <strong>Tarih: ${record.tarih}</strong> <span class="badge">${record.km} KM</span><br>
                                <small>Gelecek Bakım: ${record.gelecek_km} KM</small><br>
                                <p>${record.islem}</p>
                            </div>
                        `;
                    });
                }
            }
        });
    }

    function bakimKaydet() {
        const plaka = document.getElementById('plaka').value;
        const marka = document.getElementById('marka').value;
        const km = document.getElementById('mevcut-km').value;
        const g_km = document.getElementById('gelecek-km').value;
        const islem = document.getElementById('yapilanlar').value;
        const tarih = new Date().toLocaleDateString('tr-TR');

        if(!plaka || !km) { alert("Plaka ve KM zorunludur!"); return; }

        const newRecord = { tarih, km, gelecek_km: g_km, islem };
        
        // Ana araç bilgilerini güncelle ve geçmişe yeni kayıt ekle
        db.ref('servis_kayitlari/' + carId).update({
            plaka: plaka,
            marka: marka,
            son_km: km
        });

        db.ref('servis_kayitlari/' + carId + '/gecmis').push(newRecord).then(() => {
            alert("Kayıt başarıyla eklendi!");
            document.getElementById('yapilanlar').value = "";
        });
    }

    function topluUret() {
        const start = document.getElementById('start-id').value;
        const end = document.getElementById('end-id').value;
        const area = document.getElementById('print-area');
        area.innerHTML = "";
        const baseUrl = window.location.href.split('?')[0];

        for(let i=start; i<=end; i++) {
            const d = document.createElement('div');
            d.style.textAlign = "center";
            d.style.border = "1px solid #ccc";
            d.style.padding = "5px";
            d.innerHTML = `<div id="q-${i}"></div><br><b>ID: ${i}</b>`;
            area.appendChild(d);
            new QRCode(document.getElementById(`q-${i}`), {
                text: baseUrl + "?id=ST-" + i,
                width: 120, height: 120
            });
        }
        setTimeout(() => { window.print(); }, 1000);
    }
</script>
</body>
</html>
