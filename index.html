<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Bakım Admin Paneli</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { margin: 0; color: #666; font-size: 14px; }
        .stat-card p { font-size: 28px; font-weight: bold; margin: 10px 0; color: #007bff; }
        
        .main-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        button { background-color: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #218838; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #333; }
        .status-stok { color: #ffc107; font-weight: bold; }
        .status-aktif { color: #28a745; font-weight: bold; }
        #qrcode-canvas { display: none; } /* Gizli QR çizim alanı */
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stat-card">
        <h3>TOPLAM ÜRETİM</h3>
        <p id="total-count">0</p>
    </div>
    <div class="stat-card">
        <h3>STOKTAKİ ÜRÜN</h3>
        <p id="stock-count" style="color: #ffc107;">0</p>
    </div>
    <div class="stat-card">
        <h3>AKTİF ÜRÜN</h3>
        <p id="active-count" style="color: #28a745;">0</p>
    </div>
</div>

<div class="main-container">
    <div class="header">
        <h2>Karekod Üretim ve Takip Paneli</h2>
        <button id="generateBtn">+ Yeni Karekod Üret</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>QR ID (Seri No)</th>
                <th>Durum</th>
                <th>Atanan Araç</th>
                <th>Oluşturma Tarihi</th>
            </tr>
        </thead>
        <tbody id="qr-table-body">
            </tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDn179sk4QyEh7TYuoU1KXcaXtigqWus6I",
        authDomain: "servis-56e5d.firebaseapp.com",
        projectId: "servis-56e5d",
        storageBucket: "servis-56e5d.firebasestorage.app",
        messagingSenderId: "497738142821",
        appId: "1:497738142821:web:7b23a60815048fbe21228c",
        measurementId: "G-T4WMVJQWZN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- 1. ANLIK VERİ TAKİBİ (OTOMATİK GÜNCELLEME) ---
    const q = query(collection(db, "karekodlar"), orderBy("olusturma_tarihi", "desc"));
    
    onSnapshot(q, (snapshot) => {
        const tableBody = document.getElementById('qr-table-body');
        tableBody.innerHTML = "";
        
        let total = 0, stock = 0, active = 0;

        snapshot.forEach((doc) => {
            const data = doc.data();
            total++;
            if(data.durum === "stokta") stock++;
            else active++;

            const row = `
                <tr>
                    <td><code>${data.qr_id}</code></td>
                    <td class="${data.durum === 'stokta' ? 'status-stok' : 'status-aktif'}">
                        ${data.durum.toUpperCase()}
                    </td>
                    <td>${data.atanan_plaka || "-"}</td>
                    <td>${data.olusturma_tarihi ? data.olusturma_tarihi.toDate().toLocaleDateString('tr-TR') : "..." }</td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        // Sayaçları Güncelle
        document.getElementById('total-count').innerText = total;
        document.getElementById('stock-count').innerText = stock;
        document.getElementById('active-count').innerText = active;
    });

    // --- 2. BENZERSİZ KAREKOD ÜRETME ---
    document.getElementById('generateBtn').addEventListener('click', async () => {
        // Benzersiz bir ID oluştur (Örn: EB-9A2B1C)
        const uniqueID = "EB-" + Math.random().toString(36).substr(2, 6).toUpperCase();
        
        try {
            await addDoc(collection(db, "karekodlar"), {
                qr_id: uniqueID,
                durum: "stokta",
                atanan_plaka: "",
                olusturma_tarihi: serverTimestamp()
            });
            alert("Yeni Karekod Üretildi ve Stoklara Eklendi: " + uniqueID);
        } catch (error) {
            console.error("Hata:", error);
        }
    });
</script>

</body>
</html>
