<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oto Nabız | QR Üretim Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        /* Kontrol Paneli (Baskıda Gizlenir) */
        .controls { 
            background: white; padding: 25px; border-radius: 20px; 
            max-width: 800px; margin: 0 auto 30px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 11px; color: #64748b; text-transform: uppercase; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 10px; font-family: inherit; box-sizing: border-box; }

        .btn-print { 
            width: 100%; background: var(--dark); color: white; border: none; 
            padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; 
        }

        /* QR Baskı Alanı */
        #print-area { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 20px; 
            justify-items: center;
        }

        /* Sticker Tasarımı */
        .sticker {
            width: 160px;
            padding: 15px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            text-align: center;
            position: relative;
        }
        
        .sticker-header { font-size: 10px; font-weight: 800; margin-bottom: 8px; color: #1e293b; height: 30px; display: flex; align-items: center; justify-content: center; }
        .sticker-logo { width: 30px; height: 30px; object-fit: contain; margin-bottom: 5px; }
        .qr-wrapper { background: white; padding: 5px; display: inline-block; }
        .sticker-footer { margin-top: 8px; font-size: 9px; font-weight: 600; color: #64748b; }
        .qr-id { font-size: 8px; color: #cbd5e1; margin-top: 4px; }

        @media print {
            .controls { display: none; }
            body { background: white; padding: 0; }
            .sticker { border: 1px solid #eee; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

<div class="controls">
    <h2 style="margin-top:0;">🖨️ QR Baskı Paneli</h2>
    <div class="grid-inputs">
        <div>
            <label>Bayi Seçin</label>
            <select id="bayi-select" onchange="updatePreview()">
                <option value="">Yükleniyor...</option>
            </select>
        </div>
        <div>
            <label>Kaç Adet Basılacak?</label>
            <input type="number" id="qr-count" value="10" min="1">
        </div>
        <div>
            <label>Başlangıç No</label>
            <input type="number" id="start-no" value="1001">
        </div>
    </div>
    <button class="btn-print" onclick="generateQRs()"><i class="fas fa-qrcode"></i> QR KODLARI OLUŞTUR VE YAZDIR</button>
</div>

<div id="print-area">
    </div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let bayiler = {};

    // 1. Bayileri Firestore'dan çek ve seçeneğe ekle
    async function bayileriYukle() {
        const snap = await getDocs(collection(db, "servisler"));
        const select = document.getElementById('bayi-select');
        select.innerHTML = '<option value="">Bayi Seçiniz</option>';
        
        snap.forEach(doc => {
            bayiler[doc.id] = doc.data();
            select.innerHTML += `<option value="${doc.id}">${doc.data().s_name}</option>`;
        });
    }

    // 2. QR'ları Oluştur
    window.generateQRs = () => {
        const bayiId = document.getElementById('bayi-select').value;
        if(!bayiId) return alert("Lütfen önce bir bayi seçin!");

        const count = document.getElementById('qr-count').value;
        const startNo = document.getElementById('start-no').value;
        const area = document.getElementById('print-area');
        const bayi = bayiler[bayiId];
        
        area.innerHTML = ""; // Temizle

        for(let i = 0; i < count; i++) {
            const uniqueID = `${bayiId}-${parseInt(startNo) + i}`;
            const targetURL = `https://emingul484-sketch.github.io/servis-takip/arac.html?id=${uniqueID}`;
            
            const sticker = document.createElement('div');
            sticker.className = 'sticker';
            sticker.innerHTML = `
                ${bayi.s_logo ? `<img src="${bayi.s_logo}" class="sticker-logo">` : ''}
                <div class="sticker-header">${bayi.s_name.toUpperCase()}</div>
                <div class="qr-wrapper" id="qr-${i}"></div>
                <div class="sticker-footer">DİJİTAL SERVİS KARTI</div>
                <div class="qr-id">ID: ${uniqueID}</div>
            `;
            area.appendChild(sticker);

            new QRCode(document.getElementById(`qr-${i}`), {
                text: targetURL,
                width: 120,
                height: 120,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        // Kısa bir bekleme sonrası yazdır
        setTimeout(() => { window.print(); }, 1000);
    }

    bayileriYukle();
</script>

</body>
</html>
