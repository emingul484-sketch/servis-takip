<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SERVİS TAKİP PRO | ADMİN PANELİ</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #151515; }
        * { box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { margin: 0; background: var(--dark-bg); color: #fff; line-height: 1.6; }
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }

        /* Başlık Stili */
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--gold); margin-bottom: 30px; }
        .header h1 { margin: 0; font-weight: 900; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }

        /* Kart Stili */
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; border: 1px solid #222; }
        
        /* Input & Form Elemanları */
        label { display: block; font-size: 12px; color: var(--gold); margin-bottom: 8px; font-weight: 700; }
        input, select, textarea { width: 100%; background: #000; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 12px; margin-bottom: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        
        /* Butonlar */
        .btn { background: linear-gradient(135deg, #d4af37, #f2d06b); color: #000; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 14px; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3); }
        .btn:active { transform: scale(0.98); }

        /* QR Üretim Alanı */
        #qr-display { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .qr-item { background: #fff; padding: 15px; border-radius: 15px; text-align: center; color: #000; }
        .qr-item b { display: block; margin-top: 10px; font-size: 12px; color: #555; }

        /* Bakım Geçmişi Listesi */
        .history-item { background: #000; border-left: 4px solid var(--gold); padding: 15px; margin-top: 15px; border-radius: 8px; }
        .history-item p { margin: 5px 0; font-size: 13px; color: #ccc; }
        .history-item .date { font-weight: 900; color: var(--gold); font-size: 14px; }

        @media print { .no-print { display: none; } body { background: white; } .qr-item { border: 1px solid #ddd; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Servis Takip</h1>
        <small id="status" style="color: #555;">Sistem Hazırlanıyor...</small>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="card">
            <h3>Yeni Karekod Üretimi</h3>
            <label>Başlangıç Numarası</label>
            <input type="number" id="start-no" value="100">
            <label>Adet</label>
            <input type="number" id="count" value="5">
            <button class="btn" onclick="generateBatch()">Karekodları Oluştur</button>
        </div>
        <div id="qr-display"></div>
    </div>

    <div id="service-panel" class="hidden">
        
        <div id="car-info" class="card hidden" style="text-align: center;">
            <div id="v-plate" style="background:#fff; color:#000; display:inline-block; padding:5px 20px; border-radius:8px; font-weight:900; font-size:24px; margin-bottom:15px;">---</div>
            <h2 id="v-model" style="margin:0; text-transform: uppercase;">MARKA / MODEL</h2>
            <div style="display: flex; justify-content: space-around; margin-top: 20px; background: #000; padding: 15px; border-radius: 12px;">
                <div><small style="color:var(--gold)">SON KM</small><div id="v-km" style="font-weight:900; font-size:18px;">0</div></div>
                <div><small style="color:var(--gold)">GELECEK KM</small><div id="v-next-km" style="font-weight:900; font-size:18px;">0</div></div>
            </div>
            <div id="history-list"></div>
            <button class="btn" onclick="toggleForm()" style="margin-top:20px;">+ Yeni Bakım Ekle</button>
        </div>

        <div id="form-card" class="card hidden">
            <h3 id="form-title" style="color:var(--gold); text-align:center;">Araç ve Bakım Kaydı</h3>
            
            <label>Plaka</label>
            <input type="text" id="f-plate" placeholder="Örn: 34 ABC 123">
            
            <label>Araç Marka / Model</label>
            <input type="text" id="f-model" placeholder="Örn: Volkswagen Golf">
            
            <label>Güncel Kilometre</label>
            <input type="number" id="f-km" placeholder="0">
            
            <label>Gelecek Bakım Kilometresi</label>
            <input type="number" id="f-next-km" placeholder="0">
            
            <label>Yapılan İşlemler</label>
            <textarea id="f-desc" rows="4" placeholder="Yağ değişimi, Filtre değişimi vb."></textarea>
            
            <button class="btn" id="save-btn" onclick="saveRecord()">Bilgileri Kaydet</button>
            <button class="btn" onclick="location.reload()" style="background:none; color:#555; margin-top:10px; box-shadow:none;">İptal</button>
        </div>
    </div>
</div>

<script>
    // 1. Firebase Ayarları (Senin projen)
    const firebaseConfig = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. URL Kontrolü
    const urlParams = new URLSearchParams(window.location.search);
    const carID = urlParams.get('id');

    if (!carID) {
        // ID yoksa Admin Panelini göster
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('status').innerText = "Admin Modu: QR Üretimi";
    } else {
        // ID varsa Servis Panelini göster
        document.getElementById('service-panel').classList.remove('hidden');
        checkCarData(carID);
    }

    // 3. Araç Bilgisi Çekme
    function checkCarData(id) {
        document.getElementById('status').innerText = "Araç Sorgulanıyor: " + id;
        db.ref('servis/' + id).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                // ARAÇ KAYITLI
                document.getElementById('car-info').classList.remove('hidden');
                document.getElementById('form-card').classList.add('hidden');
                
                document.getElementById('v-plate').innerText = data.plaka;
                document.getElementById('v-model').innerText = data.marka;
                
                const list = document.getElementById('history-list');
                list.innerHTML = "";
                if (data.gecmis) {
                    const records = Object.values(data.gecmis).reverse();
                    document.getElementById('v-km').innerText = records[0].km;
                    document.getElementById('v-next-km').innerText = records[0].gelecek;
                    
                    records.forEach(r => {
                        list.innerHTML += `<div class="history-item">
                            <div class="date">${r.tarih}</div>
                            <p><b>KM:</b> ${r.km} | <b>Sonraki:</b> ${r.gelecek}</p>
                            <p>${r.islem}</p>
                        </div>`;
                    });
                }
            } else {
                // ARAÇ HENÜZ KAYITLI DEĞİL
                document.getElementById('form-card').classList.remove('hidden');
                document.getElementById('status').innerText = "Yeni Araç Kaydı (ID: " + id + ")";
            }
        });
    }

    // 4. Yeni Kayıt Kaydetme
    function saveRecord() {
        const btn = document.getElementById('save-btn');
        const plate = document.getElementById('f-plate').value.toUpperCase();
        const model = document.getElementById('f-model').value;
        const km = document.getElementById('f-km').value;
        const nextKm = document.getElementById('f-next-km').value;
        const desc = document.getElementById('f-desc').value;

        if (!plate || !km) { alert("Lütfen Plaka ve KM giriniz!"); return; }

        btn.disabled = true;
        btn.innerText = "Kaydediliyor...";

        const record = {
            tarih: new Date().toLocaleDateString('tr-TR'),
            km: km,
            gelecek: nextKm,
            islem: desc
        };

        db.ref('servis/' + carID).update({
            plaka: plate,
            marka: model
        }).then(() => {
            return db.ref('servis/' + carID + '/gecmis').push(record);
        }).then(() => {
            alert("Başarıyla Kaydedildi!");
            location.reload();
        }).catch(err => {
            alert("Hata: " + err.message);
            btn.disabled = false;
        });
    }

    // 5. Admin: Seri QR Üretme
    function generateBatch() {
        const start = parseInt(document.getElementById('start-no').value);
        const count = parseInt(document.getElementById('count').value);
        const display = document.getElementById('qr-display');
        display.innerHTML = "";
        
        const currentUrl = window.location.href.split('?')[0];

        for (let i = 0; i < count; i++) {
            const currentID = "S" + (start + i);
            const qrWrapper = document.createElement('div');
            qrWrapper.className = "qr-item";
            qrWrapper.innerHTML = `<div id="qr-${currentID}"></div><b>Seri: ${currentID}</b>`;
            display.appendChild(qrWrapper);

            new QRCode(document.getElementById("qr-" + currentID), {
                text: currentUrl + "?id=" + currentID,
                width: 120, height: 120
            });
        }
    }

    function toggleForm() {
        document.getElementById('form-card').classList.toggle('hidden');
    }
</script>

</body>
</html>
