<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SmartServis | Dijital Bakım Defteri</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #0061ff; --light-blue: #e0ebff; --text: #1e293b; --gray: #64748b; --bg: #f4f7fe; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text); padding-bottom: 40px; }
        .container { max-width: 480px; margin: auto; padding: 15px; }
        .hidden { display: none !important; }

        /* HEADER */
        .header { text-align: center; padding: 25px 0; }
        .header h1 { font-weight: 800; color: var(--blue); margin: 0; font-size: 24px; letter-spacing: -1px; }
        .header p { font-size: 12px; color: var(--gray); font-weight: 500; text-transform: uppercase; margin-top: 5px; }

        /* CARDS */
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.05); margin-bottom: 20px; }
        
        /* PLAKA */
        .plate-box { background: white; border: 2.5px solid #222; display: inline-flex; border-radius: 8px; font-weight: 800; overflow: hidden; margin-bottom: 15px; }
        .tr-side { background: #003399; color: white; padding: 6px 8px; font-size: 12px; display: flex; align-items: center; justify-content: center; min-width: 35px; }
        .plate-text { padding: 6px 15px; font-size: 22px; color: #111; letter-spacing: 1px; }

        /* BUTTONS */
        .btn { background: var(--blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: 700; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .btn-call { background: #10b981; margin-bottom: 10px; }
        .btn-map { background: #6366f1; }
        .btn-outline { background: #f8fafc; color: var(--gray); border: 1px solid #e2e8f0; }

        /* FORM */
        label { display: block; font-size: 12px; font-weight: 700; color: var(--gray); margin: 0 0 8px 5px; }
        input, textarea, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px; outline: none; font-size: 15px; background: #fff; }
        input:focus { border-color: var(--blue); }

        /* HISTORY ITEMS */
        .history-item { background: #fff; border-radius: 15px; padding: 15px; border: 1px solid #f1f5f9; margin-top: 10px; position: relative; }
        .history-item .date { font-weight: 800; color: var(--blue); font-size: 13px; margin-bottom: 5px; }
        .history-item .km { font-size: 12px; color: var(--gray); margin-bottom: 8px; font-weight: 600; }
        .history-item .desc { font-size: 14px; color: var(--text); line-height: 1.4; }

        /* ADMIN QR GRID */
        .qr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .qr-card { background: white; padding: 15px; border-radius: 15px; text-align: center; font-size: 11px; font-weight: 700; }

        @media print { .no-print { display: none; } body { background: white; } .card { box-shadow: none; border: 1px solid #eee; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header no-print">
        <h1>SMART SERVİS</h1>
        <p>Dijital Bakım Kayıt Sistemi</p>
    </div>

    <div id="panel-admin" class="hidden no-print">
        <div class="card">
            <h3 style="margin-top:0">Karekod Üretim Merkezi</h3>
            <label>Başlangıç Numarası</label>
            <input type="number" id="start-no" value="1001">
            <label>Üretilecek Adet</label>
            <input type="number" id="count-no" value="6">
            <button class="btn" onclick="generateBatch()"><i class="fa fa-plus"></i> Karekodları Oluştur</button>
        </div>
        <div id="qr-output" class="qr-grid"></div>
    </div>

    <div id="panel-main" class="hidden">
        
        <div id="view-section" class="hidden">
            <div class="card" style="text-align:center;">
                <div class="plate-box"><div class="tr-side">TR</div><div id="v-plate" class="plate-text">---</div></div>
                <h2 id="v-brand" style="margin:0; font-size:20px; font-weight:800;">MARKA MODEL</h2>
                
                <div style="display:flex; justify-content:space-between; margin-top:20px; background:var(--light-blue); padding:15px; border-radius:15px;">
                    <div style="text-align:left;"><small>SON KM</small><div id="v-km" style="font-weight:800; font-size:18px;">0</div></div>
                    <div style="text-align:right;"><small>GELECEK KM</small><div id="v-nkm" style="font-weight:800; font-size:18px; color:var(--blue);">0</div></div>
                </div>

                <div style="margin-top:20px;">
                    <button class="btn btn-call" onclick="window.location.href='tel:+905000000000'"><i class="fa fa-phone"></i> Servisi Ara</button>
                    <button class="btn btn-map" onclick="window.location.href='https://goo.gl/maps/xyz'"><i class="fa fa-location-dot"></i> Yol Tarifi Al</button>
                </div>
            </div>

            <div id="history-container"></div>
            
            <div class="no-print">
                <button class="btn" style="margin-top:20px;" onclick="showForm()">YENİ BAKIM EKLE</button>
                <button class="btn btn-outline" style="margin-top:10px;" onclick="window.print()">PDF SERVİS FİŞİ AL</button>
            </div>
        </div>

        <div id="form-section" class="hidden no-print">
            <div class="card">
                <h3 id="form-title" style="margin-top:0; color:var(--blue)">Araç Kayıt Formu</h3>
                <label>Araç Plakası</label>
                <input type="text" id="f-plate" placeholder="34 ABC 123">
                <label>Araç Marka Model</label>
                <input type="text" id="f-brand" placeholder="Örn: Toyota Corolla">
                <label>Güncel Kilometre</label>
                <input type="number" id="f-km" placeholder="0">
                <label>Gelecek Bakım Kilometresi</label>
                <input type="number" id="f-nkm" placeholder="0">
                <label>Yapılan İşlemler</label>
                <textarea id="f-desc" rows="4" placeholder="Yağ değişimi, filtreler, fren kontrolü..."></textarea>
                
                <div style="background: #fff5f5; padding: 10px; border-radius: 10px; margin-bottom: 15px;">
                    <label style="color: #c53030;">🔒 Servise Özel Notlar (Müşteri Göremez)</label>
                    <textarea id="f-private" placeholder="Araçta görülen kritik sorunlar..." style="margin-bottom:0; border-color:#feb2b2"></textarea>
                </div>

                <button class="btn" id="save-btn" onclick="saveRecord()">SİSTEME KAYDET & BİLDİR</button>
                <button class="btn btn-outline" style="margin-top:10px;" onclick="location.reload()">İptal</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. FIREBASE BAĞLANTISI
    const firebaseConfig = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const carID = urlParams.get('id');

    // 2. SAYFA YÜKLEME MANTIĞI
    if (!carID) {
        document.getElementById('panel-admin').classList.remove('hidden');
    } else {
        document.getElementById('panel-main').classList.remove('hidden');
        loadCarData(carID);
    }

    function loadCarData(id) {
        db.ref('servis_v3/' + id).on('value', (snap) => {
            const data = snap.val();
            if (data) {
                document.getElementById('view-section').classList.remove('hidden');
                document.getElementById('form-section').classList.add('hidden');
                document.getElementById('v-plate').innerText = data.plaka;
                document.getElementById('v-brand').innerText = data.marka;
                
                const container = document.getElementById('history-container');
                container.innerHTML = "<h4 style='margin:20px 0 10px 5px'>Bakım Geçmişi</h4>";
                
                if (data.gecmis) {
                    const list = Object.values(data.gecmis).reverse();
                    document.getElementById('v-km').innerText = list[0].km + " KM";
                    document.getElementById('v-nkm').innerText = list[0].nkm + " KM";
                    
                    list.forEach(r => {
                        container.innerHTML += `
                            <div class="history-item">
                                <div class="date">${r.tarih}</div>
                                <div class="km">${r.km} KM</div>
                                <div class="desc">${r.islem}</div>
                            </div>`;
                    });
                }
            } else {
                document.getElementById('form-section').classList.remove('hidden');
            }
        });
    }

    // 3. VERİ KAYDETME
    function saveRecord() {
        const btn = document.getElementById('save-btn');
        const plate = document.getElementById('f-plate').value.toUpperCase();
        const km = document.getElementById('f-km').value;
        const nkm = document.getElementById('f-nkm').value;
        const desc = document.getElementById('f-desc').value;
        const priv = document.getElementById('f-private').value;

        if (!plate || !km) { alert("Lütfen plaka ve KM girin!"); return; }

        btn.disabled = true;
        btn.innerText = "KAYDEDİLİYOR...";

        const record = {
            tarih: new Date().toLocaleDateString('tr-TR'),
            km: km,
            nkm: nkm,
            islem: desc,
            servis_notu: priv
        };

        db.ref('servis_v3/' + carID).update({ plaka: plate, marka: document.getElementById('f-brand').value })
        .then(() => {
            return db.ref('servis_v3/' + carID + '/gecmis').push(record);
        }).then(() => {
            alert("KAYIT BAŞARILI! Müşteriye bilgi SMS'i sıraya alındı.");
            location.reload();
        });
    }

    // 4. QR ÜRETİM (ADMİN)
    function generateBatch() {
        const start = parseInt(document.getElementById('start-no').value);
        const count = parseInt(document.getElementById('count-no').value);
        const output = document.getElementById('qr-output');
        output.innerHTML = "";
        const url = window.location.href.split('?')[0];

        for (let i = 0; i < count; i++) {
            const currentID = "S" + (start + i);
            const div = document.createElement('div');
            div.className = "qr-card";
            div.innerHTML = `<div id="q-${currentID}"></div><br>${currentID}`;
            output.appendChild(div);
            new QRCode(document.getElementById("q-"+currentID), { text: url + "?id=" + currentID, width: 120, height: 120 });
        }
    }

    function showForm() {
        document.getElementById('view-section').classList.add('hidden');
        document.getElementById('form-section').classList.remove('hidden');
        document.getElementById('form-title').innerText = "Yeni Bakım Girişi";
    }
</script>
</body>
</html>
