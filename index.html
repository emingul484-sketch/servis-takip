<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>E-Bakım Ajandası | Dijital Takip</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --blue: #2563eb; --bg: #f8fafc; --text: #1e293b; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--text); }
        .container { max-width: 500px; margin: auto; padding: 20px; }
        .hidden { display: none !important; }

        /* Kart Yapısı */
        .card { background: #fff; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--blue); margin: 0; font-size: 22px; font-weight: 800; }
        
        /* Form Elemanları */
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #64748b; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 15px; outline: none; font-size: 15px; background: #fff; }
        
        /* Hızlı Bakım Seçenekleri */
        .checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .check-item { display: flex; align-items: center; background: #f1f5f9; padding: 10px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid transparent; }
        .check-item input { width: auto; margin-right: 8px; margin-bottom: 0; }

        /* Plaka Stili */
        .plate { background: #fff; border: 2.5px solid #333; display: inline-flex; border-radius: 6px; font-weight: 800; overflow: hidden; margin-bottom: 10px; }
        .tr-blue { background: #003399; color: #fff; padding: 5px 8px; font-size: 12px; display: flex; align-items: center; }
        .plate-no { padding: 5px 15px; font-size: 20px; color: #000; letter-spacing: 1px; }

        .btn { background: var(--blue); color: #fff; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 5px; }
        
        #qr-results { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .qr-box { background: #fff; padding: 10px; border-radius: 10px; text-align: center; border: 1px solid var(--border); font-size: 12px; }

        @media print { .no-print { display: none; } .container { max-width: 100%; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="main-title">E-BAKIM AJANDASI</h1>
        <p id="status-text" style="font-size: 12px; color: #64748b;">Sistem Hazır</p>
    </div>

    <div id="admin-area" class="hidden no-print">
        <div class="card">
            <h3 style="margin-top:0">Toplu Karekod Üret</h3>
            <label>Kaç Adet Üretilecek?</label>
            <input type="number" id="qr-count" placeholder="Örn: 20">
            <button class="btn" onclick="generateQRs()">KAREKODLARI OLUŞTUR</button>
        </div>
        <div id="qr-results"></div>
    </div>

    <div id="ajanda-area" class="hidden">
        
        <div id="view-mode" class="hidden">
            <div class="card" style="text-align:center;">
                <div class="plate"><div class="tr-blue">TR</div><div id="v-plate" class="plate-no">---</div></div>
                <h2 id="v-title" style="margin:5px 0;">Yükleniyor...</h2>
                
                <div style="display:flex; justify-content:space-around; background:#f1f5f9; padding:15px; border-radius:12px; margin:15px 0;">
                    <div><small>SON KM</small><div id="v-km" style="font-weight:800;">0</div></div>
                    <div><small>HEDEF KM</small><div id="v-nkm" style="font-weight:800; color:var(--blue);">0</div></div>
                </div>
                
                <div id="history-list" style="text-align:left;"></div>
                <button class="btn" onclick="openForm()">YENİ BAKIM EKLE</button>
            </div>
        </div>

        <div id="form-mode" class="hidden">
            <div class="card">
                <h3 style="color:var(--blue); margin-top:0;">Araç Bakım Bilgileri</h3>
                <label>Plaka</label><input type="text" id="f-plate" placeholder="Örn: 34ABC123">
                <label>Marka Model</label><input type="text" id="f-brand" placeholder="Örn: Ford Focus 2022">
                <label>Şu Anki Kilometre</label><input type="number" id="f-km" placeholder="0">
                <label>Gelecek Bakım Kilometresi</label><input type="number" id="f-nkm" placeholder="0">

                <label>Yapılan İşlemler (Hızlı Seçim)</label>
                <div class="checklist">
                    <label class="check-item"><input type="checkbox" value="Yağ Filtresi"> Yağ Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Hava Filtresi"> Hava Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Motor Yağı"> Motor Yağı</label>
                    <label class="check-item"><input type="checkbox" value="Polen Filtresi"> Polen Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Mazot Filtresi"> Mazot Filtresi</label>
                    <label class="check-item"><input type="checkbox" value="Antifriz"> Antifriz</label>
                    <label class="check-item"><input type="checkbox" value="Balatalar"> Balata Kontrol</label>
                    <label class="check-item"><input type="checkbox" value="Silecek"> Silecek Değişimi</label>
                </div>

                <label>Ek Notlar</label>
                <textarea id="f-desc" rows="3" placeholder="Diğer yapılan işlemler..."></textarea>
                
                <button class="btn" id="save-btn" onclick="saveData()">BİLGİLERİ KAYDET</button>
                <button class="btn" style="background:none; color:#64748b; margin-top:10px;" onclick="location.reload()">İptal</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Firebase Ayarları
    const fbConfig = { databaseURL: "https://bakm-d2f77-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(fbConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    // MANTIK: Linkte ID yoksa Admin'i aç, varsa Araç Ajandasını aç
    if (!id) {
        document.getElementById('admin-area').classList.remove('hidden');
    } else {
        document.getElementById('ajanda-area').classList.remove('hidden');
        checkAndLoad(id);
    }

    // ARACI SORGULA
    function checkAndLoad(carId) {
        document.getElementById('status-text').innerText = "ID: " + carId;
        
        db.ref('ajanda/' + carId).on('value', (snap) => {
            const data = snap.val();
            // Eğer araç verisi VARSA ve içinde en azından plaka bilgisi varsa GÖRÜNTÜLE
            if (data && data.plaka) {
                document.getElementById('view-mode').classList.remove('hidden');
                document.getElementById('form-mode').classList.add('hidden');
                
                document.getElementById('v-plate').innerText = data.plaka;
                document.getElementById('v-title').innerText = data.marka;
                
                const list = document.getElementById('history-list');
                list.innerHTML = "<b style='font-size:14px; display:block; margin-bottom:10px;'>Geçmiş Bakımlar</b>";
                
                if (data.kayitlar) {
                    const recs = Object.values(data.kayitlar).reverse();
                    document.getElementById('v-km').innerText = recs[0].km + " KM";
                    document.getElementById('v-nkm').innerText = recs[0].nkm + " KM";
                    
                    recs.forEach(r => {
                        list.innerHTML += `
                            <div style="background:#f8fafc; padding:12px; border-radius:10px; border-left:4px solid var(--blue); margin-bottom:10px; font-size:13px;">
                                <div style="color:var(--blue); font-weight:800; margin-bottom:4px;">${r.tarih} - ${r.km} KM</div>
                                <div>${r.islem}</div>
                            </div>`;
                    });
                }
            } else {
                // ARAÇ KAYITLI DEĞİLSE: Direkt kayıt formunu göster (BOŞ QR DURUMU)
                document.getElementById('form-mode').classList.remove('hidden');
                document.getElementById('view-mode').classList.add('hidden');
            }
        });
    }

    // VERİ KAYDET
    function saveData() {
        const plaka = document.getElementById('f-plate').value.trim().toUpperCase();
        const marka = document.getElementById('f-brand').value.trim();
        const km = document.getElementById('f-km').value;
        const nkm = document.getElementById('f-nkm').value;
        const note = document.getElementById('f-desc').value;

        if (!plaka || !km) return alert("Plaka ve KM alanlarını doldurun!");

        const saveBtn = document.getElementById('save-btn');
        saveBtn.innerText = "Kaydediliyor...";
        saveBtn.disabled = true;

        let selected = [];
        document.querySelectorAll('.checklist input:checked').forEach(i => selected.push(i.value));
        const tumIslemler = selected.join(', ') + (note ? " | " + note : "");

        const yeniKayit = {
            tarih: new Date().toLocaleDateString('tr-TR'),
            km: km,
            nkm: nkm,
            islem: tumIslemler || "Genel Kontrol"
        };

        // Aracı güncelle ve kaydı ekle
        db.ref('ajanda/' + id).update({ plaka: plaka, marka: marka })
        .then(() => db.ref('ajanda/' + id + '/kayitlar').push(yeniKayit))
        .then(() => {
            alert("BAŞARIYLA KAYDEDİLDİ!");
            location.reload();
        }).catch(err => alert("Hata: " + err.message));
    }

    // ADMIN: QR ÜRETME
    function generateQRs() {
        const count = document.getElementById('qr-count').value;
        const output = document.getElementById('qr-results');
        output.innerHTML = "";
        const baseUrl = window.location.href.split('?')[0];

        if (count > 100) return alert("Tek seferde en fazla 100 adet!");

        for (let i = 0; i < count; i++) {
            const randomID = "EB" + Math.random().toString(36).substr(2, 6).toUpperCase();
            const box = document.createElement('div');
            box.className = "qr-box";
            box.innerHTML = `<div id="q-${randomID}"></div><br><b>${randomID}</b>`;
            output.appendChild(box);

            new QRCode(document.getElementById("q-" + randomID), {
                text: baseUrl + "?id=" + randomID,
                width: 100, height: 100
            });
        }
    }

    function openForm() {
        document.getElementById('view-mode').classList.add('hidden');
        document.getElementById('form-mode').classList.remove('hidden');
    }
</script>
</body>
</html>
