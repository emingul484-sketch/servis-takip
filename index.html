<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Bakım Admin Üretim Paneli</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 20px; border-radius: 10px; flex: 1; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .main-card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        .btn { padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-green { background: #28a745; color: white; }
        .btn-blue { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; margin-top: 50px; opacity: 0.6; }
        .btn-danger:hover { opacity: 1; }
        #printArea { display: none; } /* Normalde gizli, baskıda görünecek */

        @media print {
            body * { display: none; }
            #printArea { display: block !important; text-align: center; padding-top: 50px; }
            #printArea canvas, #printArea img { width: 250px; height: 250px; margin: 0 auto; }
        }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="stat-card"><h3>STOK</h3><p id="stock-count">0</p></div>
    <div class="stat-card"><h3>AKTİF</h3><p id="active-count">0</p></div>
</div>

<div class="main-card">
    <div style="display: flex; justify-content: space-between;">
        <h2>Üretim ve Takip</h2>
        <button class="btn btn-green" id="generateBtn">+ Yeni Karekod Üret</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Durum</th>
                <th>İşlem</th>
            </tr>
        </thead>
        <tbody id="qr-table-body"></tbody>
    </table>

    <button class="btn btn-danger" id="resetBtn">Sistemi Sıfırla (Tüm Verileri Sil)</button>
</div>

<div id="printArea">
    <h1 id="printID"></h1>
    <div id="printQR" style="display: flex; justify-content: center;"></div>
    <p>Araç Bakım Takip Sistemi</p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, onSnapshot, orderBy, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDn179sk4QyEh7TYuoU1KXcaXtigqWus6I",
        authDomain: "servis-56e5d.firebaseapp.com",
        projectId: "servis-56e5d",
        storageBucket: "servis-56e5d.firebasestorage.app",
        messagingSenderId: "497738142821",
        appId: "1:497738142821:web:7b23a60815048fbe21228c"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const siteUrl = "https://emingul484-sketch.github.io/servis-takip/arac.html?id=";

    // --- LİSTELEME VE SAYAÇLAR ---
    onSnapshot(query(collection(db, "karekodlar"), orderBy("olusturma_tarihi", "desc")), (snapshot) => {
        const tableBody = document.getElementById('qr-table-body');
        tableBody.innerHTML = "";
        let stock = 0, active = 0;

        snapshot.forEach((sDoc) => {
            const data = sDoc.data();
            data.durum === "stokta" ? stock++ : active++;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td><b>${data.qr_id}</b></td>
                <td>${data.durum.toUpperCase()}</td>
                <td><button class="btn btn-blue print-single" data-id="${data.qr_id}">Baskıya Ver</button></td>
            `;
            tableBody.appendChild(row);
        });
        document.getElementById('stock-count').innerText = stock;
        document.getElementById('active-count').innerText = active;

        // Baskı Butonlarına Görev Atama
        document.querySelectorAll('.print-single').forEach(btn => {
            btn.onclick = () => baskiyaVer(btn.getAttribute('data-id'));
        });
    });

    // --- YENİ ÜRETİM ---
    document.getElementById('generateBtn').onclick = async () => {
        const uniqueID = "EB" + Math.floor(1000 + Math.random() * 9000); // Örn: EB1234
        await addDoc(collection(db, "karekodlar"), {
            qr_id: uniqueID,
            durum: "stokta",
            olusturma_tarihi: serverTimestamp()
        });
    };

    // --- BASKI FONKSİYONU ---
    function baskiyaVer(id) {
        document.getElementById('printID').innerText = id;
        document.getElementById('printQR').innerHTML = "";
        new QRCode(document.getElementById('printQR'), {
            text: siteUrl + id,
            width: 256,
            height: 256
        });
        setTimeout(() => { window.print(); }, 500);
    }

    // --- SİSTEMİ SIFIRLA ---
    document.getElementById('resetBtn').onclick = async () => {
        if(confirm("DİKKAT! Tüm karekodlar ve veriler silinecek. Emin misin?")) {
            const querySnapshot = await getDocs(collection(db, "karekodlar"));
            querySnapshot.forEach(async (d) => { await deleteDoc(doc(db, "karekodlar", d.id)); });
            alert("Sistem temizlendi.");
        }
    };
</script>
</body>
</html>
