<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oto Nabız | Sistem Yönetimi</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f4f7fe; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        .header { background: var(--dark); color: white; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; }
        .main { padding: 40px; max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 800; font-size: 12px; margin-bottom: 8px; color: #64748b; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--accent); outline: none; }
        .upload-area { border: 2px dashed #cbd5e1; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; background: #fcfdfe; }
        .upload-area:hover { border-color: var(--accent); background: #f8faff; }
        #logo-preview { max-width: 120px; margin-top: 15px; border-radius: 10px; display: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-save { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .loading-text { display: none; color: var(--accent); font-weight: 700; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: 800; font-size: 20px;">OTO NABIZ <span style="font-weight: 400; opacity: 0.6;">| Admin</span></div>
</div>

<div class="main">
    <div class="card">
        <h2 style="margin-top:0; margin-bottom:25px; font-size:22px;">Yeni Bayilik Tanımla</h2>
        
        <div class="form-group">
            <label>Bayi / Servis Adı</label>
            <input type="text" id="s_name" placeholder="Örn: Battalbey Cengiz Topel">
        </div>

        <div class="form-group">
            <label>Panel Giriş ID (Kullanıcı Adı)</label>
            <input type="text" id="s_user" placeholder="Örn: battalbey01">
        </div>

        <div class="form-group">
            <label>Giriş Şifresi</label>
            <input type="password" id="s_sifre" placeholder="****">
        </div>

        <div class="form-group">
            <label>Bayi Logosu</label>
            <div class="upload-area" onclick="document.getElementById('logo-input').click()">
                <i class="fas fa-image" style="font-size: 24px; color: #94a3b8;"></i>
                <p style="margin: 8px 0 0 0; font-size: 13px; font-weight: 600; color: #64748b;">Logo Seçmek İçin Tıklayın</p>
                <input type="file" id="logo-input" hidden accept="image/*" onchange="handleLogoUpload(this)">
                <div id="loading-info" class="loading-text"><i class="fas fa-spinner fa-spin"></i> Resim Buluta Yükleniyor...</div>
                <img id="logo-preview">
            </div>
            <input type="hidden" id="s_logo_url">
        </div>

        <button class="btn-save" onclick="bayiKaydet()">BAYİYİ SİSTEME EKLE</button>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // GÖRSELDEN ALINAN IMGBB API ANAHTARI
    const IMGBB_API_KEY = "0fd006aeed01a4802808abbfc44990ca";

    window.handleLogoUpload = async (input) => {
        const file = input.files[0];
        if (!file) return;

        const loading = document.getElementById('loading-info');
        const preview = document.getElementById('logo-preview');
        loading.style.display = 'block';
        preview.style.display = 'none';

        const formData = new FormData();
        formData.append("image", file);

        try {
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();
            
            if (result.success) {
                document.getElementById('s_logo_url').value = result.data.url;
                preview.src = result.data.url;
                preview.style.display = 'inline-block';
                loading.style.display = 'none';
            } else {
                alert("Yükleme başarısız oldu.");
                loading.style.display = 'none';
            }
        } catch (error) {
            console.error("Hata:", error);
            alert("Bağlantı hatası!");
            loading.style.display = 'none';
        }
    };

    window.bayiKaydet = async () => {
        const user = document.getElementById('s_user').value.trim();
        const name = document.getElementById('s_name').value.trim();
        const pass = document.getElementById('s_sifre').value.trim();
        const logo = document.getElementById('s_logo_url').value;

        if (!user || !name || !pass) {
            alert("Lütfen zorunlu alanları doldurun!");
            return;
        }

        try {
            await setDoc(doc(db, "servisler", user), {
                s_name: name,
                s_sifre: pass,
                s_logo: logo || ""
            });
            alert(name + " bayisi sisteme kaydedildi.");
            location.reload();
        } catch (e) {
            alert("Kaydetme hatası: " + e);
        }
    };
</script>
</body>
</html>
