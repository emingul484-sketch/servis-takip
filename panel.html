<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karekod Oto | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #2563eb; --bg: #f4f7fe; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; display: flex; }
        .sidebar { width: 260px; background: var(--dark); height: 100vh; color: white; padding: 20px; box-sizing: border-box; position: fixed; }
        .main-content { margin-left: 260px; padding: 40px; width: calc(100% - 260px); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }
        
        /* QR Üretici Tasarımı */
        .qr-output-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; margin-top: 20px; }
        .qr-item { background: white; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #e2e8f0; }
        .qr-item canvas { width: 100% !important; height: auto !important; }
        .qr-label { font-size: 11px; font-weight: 800; margin-top: 10px; color: var(--dark); }

        @media print {
            .sidebar, .btn-add, .admin-only, h2, label { display: none !important; }
            .main-content { margin: 0; padding: 0; }
            .qr-output-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h1 style="font-size: 20px; font-weight: 800;">Karekod Oto<br><span style="color: var(--accent); font-size: 14px;">YÖNETİM</span></h1>
    <p style="font-size: 11px; opacity: 0.5; margin-top: 50px;">MENÜ</p>
    <nav>
        <div style="cursor:pointer; padding:10px 0;" onclick="showTab('bayi-ekle')"><i class="fas fa-store"></i> Bayi Yönetimi</div>
        <div style="cursor:pointer; padding:10px 0;" onclick="showTab('qr-uret')"><i class="fas fa-qrcode"></i> QR Kod Üretici</div>
    </nav>
</div>

<div class="main-content">
    
    <div id="bayi-ekle" class="tab-content">
        <div class="card">
            <h2>Yeni Bayi Tanımla</h2>
            <div class="form-grid">
                <input type="text" id="s_name" placeholder="Dükkan Adı">
                <input type="text" id="s_user" placeholder="Kullanıcı Adı">
                <input type="text" id="s_sifre" placeholder="Şifre">
                <input type="text" id="s_logo" placeholder="Logo URL">
            </div>
            <button class="btn-add" style="margin-top:20px" onclick="servisKaydet()">BAYİYİ SİSTEME EKLE</button>
        </div>
    </div>

    <div id="qr-uret" class="tab-content" style="display:none">
        <div class="card">
            <h2>Toplu QR Oluşturucu</h2>
            <p style="font-size: 13px; color: #64748b;">ID Başlangıcı ve Adet belirleyin. Sistem otomatik olarak Firebase'e boş kayıt açacaktır.</p>
            <div class="form-grid">
                <div>
                    <label style="font-size: 12px; font-weight: 800;">ID BAŞLANGIÇ (Örn: 1000)</label>
                    <input type="number" id="qr_start" value="1000">
                </div>
                <div>
                    <label style="font-size: 12px; font-weight: 800;">KAÇ ADET ÜRETİLSİN?</label>
                    <input type="number" id="qr_count" value="10">
                </div>
            </div>
            <button class="btn-add" style="margin-top:20px; background: #22c55e;" onclick="topluQRUret()">QR KODLARI OLUŞTUR VE YAZDIR</button>
        </div>

        <div id="qr-display-area" class="qr-output-grid"></div>
    </div>

</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.showTab = (tabId) => {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(tabId).style.display = 'block';
    };

    window.servisKaydet = async () => {
        const user = document.getElementById('s_user').value;
        await setDoc(doc(db, "servisler", user), {
            s_name: document.getElementById('s_name').value,
            s_sifre: document.getElementById('s_sifre').value,
            s_logo: document.getElementById('s_logo').value
        });
        alert("Bayi Eklendi!");
    };

    window.topluQRUret = async () => {
        const start = parseInt(document.getElementById('qr_start').value);
        const count = parseInt(document.getElementById('qr_count').value);
        const area = document.getElementById('qr-display-area');
        area.innerHTML = "Oluşturuluyor, lütfen bekleyin...";

        const baseUrl = "https://emingul484-sketch.github.io/servis-takip/arac.html?id=";

        for(let i = 0; i < count; i++) {
            const currentID = (start + i).toString();
            const fullUrl = baseUrl + currentID;

            // 1. Firebase'e Boş Kayıt At (Sistemin bu ID'yi tanıması için)
            await setDoc(doc(db, "karekodlar", currentID), {
                qr_id: currentID,
                servis_id: "", // Henüz bir dükkana bağlı değil
                plaka: ""      // Henüz bir araca bağlı değil
            });

            // 2. Ekranda QR Kod Oluştur
            const qrDiv = document.createElement('div');
            qrDiv.className = 'qr-item';
            qrDiv.innerHTML = `<div id="qr-${currentID}"></div><div class="qr-label">ID: ${currentID}</div>`;
            area.appendChild(qrDiv);

            new QRCode(document.getElementById(`qr-${currentID}`), {
                text: fullUrl,
                width: 128,
                height: 128
            });
        }
        
        alert("QR Kodlar Firebase'e işlendi ve oluşturuldu. Ctrl+P yaparak yazdırabilirsiniz.");
    };
</script>
</body>
</html>
