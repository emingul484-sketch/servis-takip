<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oto Nabız | Bayi Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --dark: #0f172a; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--dark); }
        
        #login-screen { background: var(--dark); height: 100vh; display: flex; align-items: center; justify-content: center; position: fixed; width: 100%; z-index: 999; }
        .login-box { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); color: white; }
        .login-box input { width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 12px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; text-align: center; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .main { padding: 30px; max-width: 1400px; margin: 0 auto; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; }
        .stat-card h3 { margin: 0; font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0 0; font-size: 28px; font-weight: 800; }

        #search-input { padding: 12px 20px; border-radius: 12px; border: 1px solid #e2e8f0; width: 100%; max-width: 300px; outline: none; }
        .table-container { background: white; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); overflow-x: auto; border: 1px solid #f1f5f9; }
        .client-table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .client-table th { background: #fcfdfe; padding: 18px; text-align: left; font-size: 11px; color: #94a3b8; border-bottom: 1px solid #f1f5f9; text-transform: uppercase; }
        .client-table td { padding: 18px; border-bottom: 1px solid #f8fafc; font-size: 14px; }
        
        .btn-wp { background: #22c55e; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; font-size: 12px; transition: 0.3s; }
        .btn-wp:hover { background: #1ab252; transform: scale(1.05); }
        
        .status-pill { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; display: inline-block; }
        .alert-red { background: #fff1f2; color: #e11d48; }
        .alert-orange { background: #fff7ed; color: #ea580c; }
        .alert-green { background: #f0fdf4; color: #16a34a; }

        @media (max-width: 768px) {
            .top-bar { padding: 15px 20px; }
            .main { padding: 15px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <i class="fas fa-user-tie" style="font-size: 40px; color: var(--accent); margin-bottom: 20px;"></i>
        <h2 style="margin-bottom:20px;">Bayi Girişi</h2>
        <input type="text" id="user-id" placeholder="Bayi Kullanıcı Adı">
        <input type="password" id="user-pass" placeholder="Şifre">
        <button onclick="login()" style="width:100%; padding:14px; border-radius:12px; border:none; background:var(--accent); color:white; font-weight:800; cursor:pointer;">GİRİŞ YAP</button>
    </div>
</div>

<div id="panel-content" style="display:none">
    <div class="top-bar">
        <div id="servis-title" style="font-weight:800; color:var(--dark); font-size:18px;">YÜKLENİYOR...</div>
        <button onclick="location.reload()" style="background:#f1f5f9; border:none; color:var(--dark); padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:700; font-size:12px;">ÇIKIŞ YAP</button>
    </div>

    <div class="main">
        <div class="stats-grid">
            <div class="stat-card"><h3>Toplam Müşteri</h3><p id="stat-total">0</p></div>
            <div class="stat-card"><h3>Bakımı Geçenler</h3><p id="stat-alert" style="color:var(--danger)">0</p></div>
            <div class="stat-card"><h3>15 Gün Kalanlar</h3><p id="stat-soon" style="color:var(--warning)">0</p></div>
        </div>

        <div style="margin-bottom:20px; display:flex; justify-content:space-between; align-items:flex-end; flex-wrap: wrap; gap: 15px;">
            <div>
                <h2 style="font-size:20px; font-weight:800; margin:0 0 10px 0;">Müşteri Takibi</h2>
                <input type="text" id="search-input" placeholder="Plaka ara..." onkeyup="tabloFiltrele()">
            </div>
            <button onclick="verileriYukle()" style="background:var(--accent); color:white; border:none; padding:12px 20px; border-radius:12px; cursor:pointer; font-size:13px; font-weight:700;"><i class="fas fa-sync-alt"></i> VERİLERİ YENİLE</button>
        </div>

        <div class="table-container">
            <table class="client-table" id="client-table">
                <thead>
                    <tr>
                        <th>PLAKA</th>
                        <th>MODEL</th>
                        <th>SON KM</th>
                        <th>HEDEF KM</th>
                        <th>TAHMİNİ TARİH</th>
                        <th>DURUM</th>
                        <th>İŞLEM</th>
                    </tr>
                </thead>
                <tbody id="client-list-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let loggedInServis = null;

    window.login = async () => {
        const uid = document.getElementById('user-id').value.trim().toLowerCase();
        const pass = document.getElementById('user-pass').value;
        if(!uid || !pass) return alert("Bilgileri girin!");

        const sSnap = await getDoc(doc(db, "servisler", uid));
        if (sSnap.exists() && sSnap.data().s_sifre === pass) {
            loggedInServis = { id: uid, ...sSnap.data() };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('panel-content').style.display = 'block';
            document.getElementById('servis-title').innerText = loggedInServis.s_name.toUpperCase();
            verileriYukle();
        } else { alert("Hatalı giriş!"); }
    };

    window.verileriYukle = async () => {
        const q = query(collection(db, "karekodlar"), where("servis_id", "==", loggedInServis.id));
        const snap = await getDocs(q);
        const listBody = document.getElementById('client-list-body');
        
        let musteriler = [];
        let alertCount = 0, soonCount = 0;

        snap.forEach(doc => {
            const data = doc.data();
            if (!data.plaka) return;
            
            const servisler = data.servisler || [];
            const sonBakim = servisler[servisler.length - 1] || { km: 0, next_km: 0, tarih: new Date().toLocaleDateString('tr-TR') };
            
            const kmFarki = (sonBakim.next_km || 0) - (sonBakim.km || 0);
            const gunEkle = kmFarki > 0 ? kmFarki / 25 : 0;
            
            const parcalar = sonBakim.tarih.split('.');
            const tDate = new Date(parcalar[2], parcalar[1]-1, parcalar[0]);
            tDate.setDate(tDate.getDate() + gunEkle);

            const farkGun = Math.ceil((tDate - new Date()) / (1000 * 60 * 60 * 24));
            let status = { text: "Zamanı Var", class: "alert-green", prio: 3 };
            if (farkGun <= 0) { status = { text: "Vakti Geçti", class: "alert-red", prio: 1 }; alertCount++; }
            else if (farkGun <= 15) { status = { text: "Az Kaldı", class: "alert-orange", prio: 2 }; soonCount++; }

            musteriler.push({ ...data, sonBakim, tDate: tDate.toLocaleDateString('tr-TR'), status });
        });

        musteriler.sort((a, b) => a.status.prio - b.status.prio);
        listBody.innerHTML = "";

        musteriler.forEach(m => {
            let wpNum = (m.musteri_tel || "").replace(/\D/g, '');
            if (wpNum.startsWith('0')) wpNum = wpNum.substring(1);
            if (wpNum.length === 10) wpNum = '90' + wpNum;

            const link = `https://emingul484-sketch.github.io/servis-takip/arac.html?id=${m.qr_id}`;
            
            // EMOJİ KORUMALI MESAJ FORMATI (TÜMÜ URL ENCODE EDİLMİŞ)
            const msgBody = `Sayın Müşterimiz,%0A%0A*${loggedInServis.s_name.toUpperCase()}* olarak aracınızın sağlığını önemsiyoruz. 🛠️%0A*${m.plaka}* plakalı aracınızın periyodik bakım vakti yaklaşmıştır.%0A%0A📍 Son Servis KM: ${Number(m.sonBakim.km).toLocaleString()}%0A🎯 Hedef Bakım: ${Number(m.sonBakim.next_km).toLocaleString()}%0A📅 Tahmini Randevu: ${m.tDate}%0A%0AAracınızın dijital servis geçmişini aşağıdaki linkten inceleyebilir, randevu için bizimle iletişime geçebilirsiniz. 📱%0A%0A💳 *Dijital Kartınız:* ${link}%0A%0Aİyi yolculuklar dileriz. ✨`;

            listBody.innerHTML += `
                <tr>
                    <td><b>${m.plaka}</b></td>
                    <td><small>${m.model || '-'}</small></td>
                    <td>${Number(m.sonBakim.km).toLocaleString()}</td>
                    <td style="color:var(--accent); font-weight:800;">${Number(m.sonBakim.next_km).toLocaleString()}</td>
                    <td>${m.tDate}</td>
                    <td><span class="status-pill ${m.status.class}">${m.status.text}</span></td>
                    <td>
                        ${wpNum ? `<a href="https://wa.me/${wpNum}?text=${msgBody}" target="_blank" class="btn-wp"><i class="fab fa-whatsapp"></i> Hatırlat</a>` : '<small>No Yok</small>'}
                    </td>
                </tr>
            `;
        });
        
        document.getElementById('stat-total').innerText = musteriler.length;
        document.getElementById('stat-alert').innerText = alertCount;
        document.getElementById('stat-soon').innerText = soonCount;
    };

    window.tabloFiltrele = () => {
        const f = document.getElementById("search-input").value.toUpperCase();
        const tr = document.getElementById("client-table").getElementsByTagName("tr");
        for (let i = 1; i < tr.length; i++) {
            tr[i].style.display = tr[i].innerText.toUpperCase().includes(f) ? "" : "none";
        }
    };
</script>
</body>
</html>
