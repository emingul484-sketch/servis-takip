<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oto Nabız | Servis Takip</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f8fafc; --dark: #0f172a; --success: #22c55e; --warning: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; background: white; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; z-index: 100; }
        .brand-right { font-weight: 800; font-size: 18px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
        
        .main { padding: 30px; max-width: 1400px; margin: 0 auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .stat-card h3 { margin: 0; font-size: 11px; color: #64748b; text-transform: uppercase; }
        .stat-card p { margin: 5px 0 0 0; font-size: 26px; font-weight: 800; color: var(--dark); }

        .client-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; }
        .client-table th { background: #fcfdfe; padding: 15px; text-align: left; font-size: 11px; color: #94a3b8; border-bottom: 1px solid #f1f5f9; }
        .client-table td { padding: 15px; border-bottom: 1px solid #f8fafc; font-size: 14px; }
        
        .btn-wp { background: #25d366; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 700; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-size: 13px; }
        .status-pill { padding: 5px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; }
        .alert-red { background: #fff1f2; color: #e11d48; }
        .alert-orange { background: #fff7ed; color: #ea580c; }
        .alert-green { background: #f0fdf4; color: #16a34a; }

        #login-screen { background: var(--dark); height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 30px; width: 320px; text-align: center; border: 1px solid rgba(255,255,255,0.1); color: white; }
        input { width: 100%; padding: 14px; border-radius: 12px; margin-bottom: 10px; background: rgba(0,0,0,0.2); color: white; border: 1px solid rgba(255,255,255,0.1); box-sizing: border-box; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2 style="margin-bottom:20px;">Oto Nabız Giriş</h2>
        <input type="text" id="user-id" placeholder="Servis Kullanıcı Adı">
        <input type="password" id="user-pass" placeholder="Şifre">
        <button onclick="login()" style="width:100%; padding:14px; border-radius:12px; border:none; background:var(--accent); color:white; font-weight:800; cursor:pointer;">Giriş</button>
    </div>
</div>

<div id="panel-content" style="display:none">
    <div class="top-bar">
        <div id="servis-title" style="font-weight:800; color:var(--dark); font-size:18px;">SERVİS PANELİ</div>
        <div class="brand-right"><i class="fas fa-heartbeat"></i> OTO NABIZ</div>
    </div>

    <div class="main">
        <div class="stats-grid">
            <div class="stat-card"><h3>Toplam Araç</h3><p id="stat-total">0</p></div>
            <div class="stat-card"><h3>Vakti Geçen</h3><p id="stat-alert" style="color:var(--danger)">0</p></div>
            <div class="stat-card"><h3>Yaklaşan</h3><p id="stat-soon" style="color:var(--warning)">0</p></div>
        </div>

        <div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
            <h2 style="font-size:18px; font-weight:800;">Müşteri Listesi</h2>
            <div>
                <button onclick="verileriYukle()" style="background:white; border:1px solid #e2e8f0; padding:8px 15px; border-radius:10px; cursor:pointer; font-size:12px; font-weight:700;"><i class="fas fa-sync"></i> Listeyi Güncelle</button>
                <button onclick="location.reload()" style="background:none; border:none; color:#94a3b8; margin-left:10px; cursor:pointer; font-size:12px;">Çıkış</button>
            </div>
        </div>

        <table class="client-table">
            <thead>
                <tr>
                    <th>PLAKA</th>
                    <th>SON KM</th>
                    <th>HEDEF KM</th>
                    <th>TAHMİNİ</th>
                    <th>DURUM</th>
                    <th>İŞLEM</th>
                </tr>
            </thead>
            <tbody id="client-list-body"></tbody>
        </table>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let loggedInServis = null;

    function formatWPNumber(phone) {
        let cleaned = phone.replace(/\D/g, '');
        if (cleaned.startsWith('0')) cleaned = cleaned.substring(1);
        if (!cleaned.startsWith('90')) cleaned = '90' + cleaned;
        return cleaned;
    }

    window.login = async () => {
        const uid = document.getElementById('user-id').value;
        const pass = document.getElementById('user-pass').value;
        const sSnap = await getDoc(doc(db, "servisler", uid));
        if (sSnap.exists() && sSnap.data().s_sifre === pass) {
            loggedInServis = { id: uid, ...sSnap.data() };
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('panel-content').style.display = 'block';
            document.getElementById('servis-title').innerText = loggedInServis.s_name.toUpperCase();
            verileriYukle();
        } else { alert("Hata!"); }
    };

    window.verileriYukle = async () => {
        const q = query(collection(db, "karekodlar"), where("servis_id", "==", loggedInServis.id));
        const snap = await getDocs(q);
        const listBody = document.getElementById('client-list-body');
        
        let musteriler = [];
        let alertCount = 0, soonCount = 0;

        snap.forEach(doc => {
            const data = doc.data();
            if (!data.plaka) return;
            const servisler = data.servisler || [];
            const sonBakim = servisler[servisler.length - 1] || { km: 0, next_km: 0, tarih: '01.01.2024' };
            
            // Tahmin Hesabı (Günde 20km)
            const kmFarki = sonBakim.next_km - sonBakim.km;
            const gunEkle = kmFarki > 0 ? kmFarki / 20 : 0;
            const parcalar = sonBakim.tarih.split('.');
            const tDate = new Date(parcalar[2], parcalar[1]-1, parcalar[0]);
            tDate.setDate(tDate.getDate() + gunEkle);

            const bugun = new Date();
            const farkGun = Math.ceil((tDate - bugun) / (1000 * 60 * 60 * 24));

            let status = { text: "Tamam", class: "alert-green", priority: 3 };
            if (farkGun <= 0) { status = { text: "Vakti Geçti", class: "alert-red", priority: 1 }; alertCount++; }
            else if (farkGun <= 15) { status = { text: "Yaklaştı", class: "alert-orange", priority: 2 }; soonCount++; }

            musteriler.push({ ...data, sonBakim, tDate: tDate.toLocaleDateString('tr-TR'), status, priority: status.priority });
        });

        musteriler.sort((a, b) => a.priority - b.priority);
        listBody.innerHTML = "";

        musteriler.forEach(m => {
            const wpNum = formatWPNumber(m.musteri_tel || "");
            const link = `https://emingul484-sketch.github.io/servis-takip/arac.html?id=${m.qr_id}`;
            const mesaj = `Merhaba, ${m.plaka} aracınızın ${m.sonBakim.next_km} KM bakım vakti gelmiştir. Kayıtları buradan inceleyebilirsiniz: ${link}`;

            listBody.innerHTML += `
                <tr>
                    <td><b>${m.plaka}</b></td>
                    <td>${m.sonBakim.km}</td>
                    <td>${m.sonBakim.next_km}</td>
                    <td>${m.tDate}</td>
                    <td><span class="status-pill ${m.status.class}">${m.status.text}</span></td>
                    <td><a href="https://wa.me/${wpNum}?text=${encodeURIComponent(mesaj)}" target="_blank" class="btn-wp">Hatırlat</a></td>
                </tr>
            `;
        });
        document.getElementById('stat-total').innerText = musteriler.length;
        document.getElementById('stat-alert').innerText = alertCount;
        document.getElementById('stat-soon').innerText = soonCount;
    };
</script>
</body>
</html>
