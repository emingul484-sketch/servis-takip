<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni Servis Kaydı | Oto Nabız</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --accent: #2563eb; --bg: #f4f7fe; --dark: #0f172a; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--dark); }
        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 500px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h2 { margin: 0; font-size: 20px; font-weight: 800; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 800; font-size: 11px; margin-bottom: 5px; color: #64748b; text-transform: uppercase; }
        input, textarea { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 15px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--accent); outline: none; background: #fff; }
        
        /* Hızlı Seçenekler Butonları */
        .quick-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .chip { background: #f1f5f9; padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .chip:hover { background: #e2e8f0; border-color: var(--accent); }
        
        .btn-save { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); transition: 0.3s; }
        .btn-save:active { transform: scale(0.98); }
        
        /* Geçmiş Kayıtlar */
        .history-box { margin-top: 30px; border-top: 2px solid #f1f5f9; padding-top: 20px; }
        .history-item { background: #f8fafc; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
        .history-date { font-size: 11px; font-weight: 800; color: var(--accent); }
        .history-km { font-size: 14px; font-weight: 700; color: var(--dark); margin: 3px 0; }
        .history-notes { font-size: 12px; color: #64748b; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div style="background: #eff6ff; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fas fa-file-signature" style="font-size: 24px; color: var(--accent);"></i>
        </div>
        <h2>Servis Kaydı Oluştur</h2>
        <p style="font-size: 13px; color: #64748b; margin-top: 5px;">Araç bilgilerini ve yapılan işlemleri girin.</p>
    </div>

    <div class="form-group">
        <label>Araç Plakası</label>
        <input type="text" id="plaka" placeholder="34ABC123" onkeyup="gecmisGetir(this.value.toUpperCase())" style="font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="form-group">
            <label>Mevcut KM</label>
            <input type="number" id="km" placeholder="0">
        </div>
        <div class="form-group">
            <label>Gelecek Bakım KM</label>
            <input type="number" id="next_km" placeholder="0">
        </div>
    </div>

    <div class="form-group">
        <label>Yapılan İşlemler</label>
        <div class="quick-chips">
            <span class="chip" onclick="notEkle('Yağ Değişimi')">+ Yağ</span>
            <span class="chip" onclick="notEkle('Hava Filtresi Değişti')">+ Hava F.</span>
            <span class="chip" onclick="notEkle('Yağ Filtresi Değişti')">+ Yağ F.</span>
            <span class="chip" onclick="notEkle('Polen Filtresi Değişti')">+ Polen F.</span>
            <span class="chip" onclick="notEkle('Fren Balataları Kontrol Edildi')">+ Balata</span>
            <span class="chip" onclick="notEkle('Genel Kontroller Yapıldı')">+ Genel Bakım</span>
        </div>
        <textarea id="notlar" rows="4" placeholder="Ekstra notlar..."></textarea>
    </div>

    <button class="btn-save" id="submit-btn" onclick="servisKaydet()">KAYDI SİSTEME İŞLE</button>

    <div class="history-box" id="history-container" style="display: none;">
        <h3 style="font-size: 14px; margin-bottom: 15px;"><i class="fas fa-history"></i> Aracın Geçmiş Kayıtları</h3>
        <div id="history-list"></div>
    </div>
</div>

<script type="module">
    import { firebaseConfig } from './config.js';
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Hızlı Not Ekleme Fonksiyonu
    window.notEkle = (text) => {
        const area = document.getElementById('notlar');
        if(area.value.includes(text)) return;
        area.value += (area.value ? ", " : "") + text;
    };

    // Plaka yazıldığında geçmişi anlık getirir
    window.gecmisGetir = async (plaka) => {
        const cleanPlaka = plaka.replace(/\s/g, '');
        if(cleanPlaka.length < 5) {
            document.getElementById('history-container').style.display = "none";
            return;
        }

        const docRef = doc(db, "karekodlar", cleanPlaka);
        const docSnap = await getDoc(docRef);

        const list = document.getElementById('history-list');
        const container = document.getElementById('history-container');
        list.innerHTML = "";

        if (docSnap.exists()) {
            const data = docSnap.data();
            const servisler = data.servisler || [];
            
            if(servisler.length > 0) {
                container.style.display = "block";
                // Son kayıt en üstte görünsün
                [...servisler].reverse().forEach(s => {
                    list.innerHTML += `
                        <div class="history-item">
                            <div class="history-date"><i class="far fa-calendar-alt"></i> ${s.tarih}</div>
                            <div class="history-km">${Number(s.km).toLocaleString()} KM Bakımı</div>
                            <div class="history-notes">${s.notlar || 'Detay girilmemiş.'}</div>
                        </div>
                    `;
                });
            } else {
                container.style.display = "none";
            }
        } else {
            container.style.display = "none";
        }
    };

    window.servisKaydet = async () => {
        const plaka = document.getElementById('plaka').value.replace(/\s/g, '').toUpperCase().trim();
        const km = document.getElementById('km').value;
        const next_km = document.getElementById('next_km').value;
        const notlar = document.getElementById('notlar').value;
        const btn = document.getElementById('submit-btn');

        if(!plaka || !km || !next_km) return alert("Lütfen tüm zorunlu alanları doldurun!");

        btn.disabled = true;
        btn.innerText = "KAYDEDİLİYOR...";

        const yeniVeri = {
            tarih: new Date().toLocaleDateString('tr-TR'),
            km: Number(km),
            next_km: Number(next_km),
            notlar: notlar
        };

        try {
            const docRef = doc(db, "karekodlar", plaka);
            // Önce plaka var mı kontrol et
            const checkDoc = await getDoc(docRef);
            
            if(!checkDoc.exists()) {
                alert("HATA: Bu plaka henüz sisteme (QR Barkod olarak) tanımlanmamış!");
                btn.disabled = false;
                btn.innerText = "KAYDI SİSTEME İŞLE";
                return;
            }

            await updateDoc(docRef, {
                servisler: arrayUnion(yeniVeri)
            });

            alert("Servis kaydı başarıyla eklendi.");
            location.reload();
        } catch (error) {
            console.error("Hata:", error);
            alert("Kayıt sırasında bir hata oluştu!");
            btn.disabled = false;
            btn.innerText = "KAYDI SİSTEME İŞLE";
        }
    };
</script>
</body>
</html>
